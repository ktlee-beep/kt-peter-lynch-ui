            </div>
            <div className="space-y-2">
              <div className="relative">
                <input type={showKey ? 'text' : 'password'} value={tempKey}
                  onChange={e => setTempKey(e.target.value)}
                  placeholder="40자리 영숫자 키"
                  className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 pr-10 text-white font-mono text-sm focus:border-blue-700 outline-none"/>
                <button onClick={() => setShowKey(!showKey)}
                  className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-500">
                  <Ic.Eye size={16}/>
                </button>
              </div>
              <button onClick={() => {
                setApiKey(tempKey);
                alert('API 키 저장 완료!');
              }} className="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 font-semibold transition">
                저장
              </button>
              {apiKey && (
                <button onClick={() => {
                  if (confirm('API 키를 삭제하시겠습니까?')) {
                    setApiKey('');
                    setTempKey('');
                  }
                }} className="w-full text-red-400 text-sm py-2">
                  키 삭제
                </button>
              )}
            </div>
          </div>
          <div className="bg-yellow-950/30 border border-yellow-900/40 rounded-xl p-4">
            <div className="text-yellow-400 font-bold text-sm mb-1 flex items-center gap-2">
              <Ic.AlertTriangle size={16}/> 보안 안내
            </div>
            <div className="text-xs text-zinc-300 space-y-1">
              <div>• API 키는 본 기기 localStorage에만 저장</div>
              <div>• 외부 서버로 전송되지 않음</div>
              <div>• 키 유출/이상 감지 시 OpenDart에서 즉시 재발급</div>
            </div>
          </div>
        </div>
      )}

      {subTab === 'backup' && (
        <div className="space-y-3">
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-white font-semibold mb-3">데이터 백업</div>
            <div className="text-xs text-zinc-500 mb-4">
              보유 종목 {holdings.length}개 · 매매 일지 {journal.length}건<br/>
              JSON 파일로 내려받아 다른 기기에서 복원 가능합니다
            </div>
            <button onClick={exportData}
              className="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3 font-semibold transition flex items-center justify-center gap-2">
              <Ic.Download size={18}/> 데이터 내보내기
            </button>
          </div>
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-white font-semibold mb-3">데이터 복원</div>
            <div className="text-xs text-zinc-500 mb-4">백업한 JSON 파일을 가져와 복원합니다</div>

              <Ic.Upload size={18}/> 데이터 가져오기
              <input type="file" accept=".json" onChange={importData} className="hidden"/>

          </div>
          <div className="bg-red-950/30 border border-red-900/40 rounded-xl p-4">
            <div className="text-red-400 font-bold text-sm mb-1 flex items-center gap-2">

                setHoldings([]);

              }
            }} className="text-red-400 text-sm">전체 데이터 삭제</button>
          </div>
        </div>
      )}

      {subTab === 'guide' && <GuidePanel/>}
    </div>
  );
}

// API 키 입력 화면 (첫 실행)
// ═══════════════════════════════════════════════
function ApiKeySetup({ onSave }) {
  const [key, setKey] = useState('');

  return (
    <div className="min-h-screen bg-zinc-950 flex items-center justify-center p-4">
      <div className="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">📈</div>
          <div className="text-2xl font-bold text-white mb-1">KT 트레이딩 v2.0</div>
          <div className="text-sm text-zinc-400">첫 실행 - OpenDart API 키 등록</div>
        </div>
        <div className="space-y-4">
          <div className="text-sm text-zinc-300">
            OpenDart 인증키를 입력하세요. 키는 본 기기에만 저장됩니다.
          </div>
          <div className="bg-blue-950/30 border border-blue-900/40 rounded-xl p-4 text-sm">
            <div className="text-blue-400 font-bold mb-2">키 발급 (3분)</div>
            <ol className="text-xs text-zinc-300 space-y-1 list-decimal pl-4">
              <li><a href="https://opendart.fss.or.kr" target="_blank" className="text-blue-400">opendart.fss.or.kr</a> 접속</li>
              <li>"인증키 신청" 버튼</li>
              <li>회원가입 + 이메일 인증</li>
              <li>40자리 키 복사</li>
              <li>아래 입력</li>
            </ol>
          </div>
          <input type="text" value={key} onChange={e => setKey(e.target.value)}
            placeholder="40자리 인증키"
            className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-3 text-white font-mono text-sm focus:border-blue-700 outline-none"/>
          <button onClick={() => {
            if (key.length < 30) {
              alert('올바른 키를 입력하세요 (40자리)');
              return;
            }
            onSave(key);
          }} className="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold">
            시작하기
          </button>
          <button onClick={() => onSave('')} className="w-full text-zinc-400 text-sm py-2">
            키 없이 사용 (나중에 설정)
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// 메인 앱
// ═══════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState('home');
  const [holdings, setHoldings] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.HOLDINGS) || '[]'); }
    catch (e) { return []; }
  });
  const [journal, setJournal] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.JOURNAL) || '[]'); }
    catch (e) { return []; }
  });
  const [checklist, setChecklist] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.CHECKLIST) || '{}'); }
    catch (e) { return {}; }
  });
  const DEFAULT_API_KEY = 'c6acee04f0536a5daabdcbc06d45a43f792ef55c';
  const [apiKey, setApiKeyState] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEYS.API_KEY);
    if (saved) return saved;
    localStorage.setItem(STORAGE_KEYS.API_KEY, DEFAULT_API_KEY);
    return DEFAULT_API_KEY;
  });
  const [showKeySetup, setShowKeySetup] = useState(false);
  const [backendUrl, setBackendUrlState] = useState(() => localStorage.getItem(STORAGE_KEYS.BACKEND_URL) || 'https://kt-peter-lynch.onrender.com');
  const [autoRefresh, setAutoRefreshState] = useState(() => localStorage.getItem(STORAGE_KEYS.AUTO_REFRESH) !== 'false');
  const [marketData, setMarketData] = useState(null);
  const [refreshStatus, setRefreshStatus] = useState({ lastUpdate: null, loading: false, error: null });

  useEffect(() => { localStorage.setItem(STORAGE_KEYS.HOLDINGS, JSON.stringify(holdings)); }, [holdings]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.JOURNAL, JSON.stringify(journal)); }, [journal]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.CHECKLIST, JSON.stringify(checklist)); }, [checklist]);

  const setApiKey = (k) => {
    setApiKeyState(k);
    if (k) localStorage.setItem(STORAGE_KEYS.API_KEY, k);
    else localStorage.removeItem(STORAGE_KEYS.API_KEY);
  };
  const setBackendUrl = (url) => {
    const cleaned = url.replace(/\/$/, '');
    setBackendUrlState(cleaned);
    if (cleaned) localStorage.setItem(STORAGE_KEYS.BACKEND_URL, cleaned);
    else localStorage.removeItem(STORAGE_KEYS.BACKEND_URL);
  };
  const setAutoRefresh = (v) => {
    setAutoRefreshState(v);
    localStorage.setItem(STORAGE_KEYS.AUTO_REFRESH, v ? 'true' : 'false');
  };

  const [watchlist, setWatchlistState] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.WATCHLIST) || '[]'); }
    catch { return []; }
  });
  const setWatchlist = (updater) => {
    setWatchlistState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      localStorage.setItem(STORAGE_KEYS.WATCHLIST, JSON.stringify(next));
      return next;
    });
  };

  // 자동 갱신 함수
  const refreshQuotes = async () => {
    if (!backendUrl || holdings.length === 0) return;
    setRefreshStatus(s => ({ ...s, loading: true, error: null }));
    try {
      const codes = holdings.map(h => h.code).join(',');
      const r = await fetch(`${backendUrl}/api/quotes?codes=${codes}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const updated = holdings.map(h => {
        const q = data.quotes.find(qq => qq.code === h.code);
        if (q && !q.error && q.price) return { ...h, currentPrice: q.price };
        return h;
      });
      setHoldings(updated);
      setRefreshStatus({ lastUpdate: Date.now(), loading: false, error: null });
    } catch (e) {
      setRefreshStatus({ lastUpdate: refreshStatus.lastUpdate, loading: false, error: e.message });
    }
  };

  const refreshMarket = async () => {
    if (!backendUrl) return;
    try {
      const r = await fetch(`${backendUrl}/api/market`);
      if (!r.ok) return;
      const data = await r.json();
      setMarketData(data);
    } catch (e) {}
  };

  // 1분마다 자동 갱신
  useEffect(() => {
    if (!autoRefresh || !backendUrl) return;
    refreshQuotes();
    refreshMarket();
    const t1 = setInterval(refreshQuotes, 60_000);
    const t2 = setInterval(refreshMarket, 120_000);
    return () => { clearInterval(t1); clearInterval(t2); };
  }, [autoRefresh, backendUrl, holdings.length]);

  // 알림 권한 요청
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  // 알림 트리거
  useEffect(() => {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    holdings.forEach(h => {
      const cur = h.currentPrice || h.buyPrice;
      const profitPct = ((cur - h.buyPrice) / h.buyPrice) * 100;
      if (h.lastAlertedPct !== undefined && Math.abs(h.lastAlertedPct - profitPct) < 1) return;

      let title, body;
      if (profitPct >= 7 && (h.lastAlertedPct || 0) < 7) {
        title = `🎯 ${h.name} 2차 익절!`;
        body = `+${profitPct.toFixed(1)}% 도달. 잔여 50% 익절 권장`;
      } else if (profitPct >= 5 && (h.lastAlertedPct || 0) < 5) {
        title = `🎯 ${h.name} 1차 익절!`;
        body = `+${profitPct.toFixed(1)}% 도달. 50% 분할매도`;
      } else if (profitPct <= -7 && (h.lastAlertedPct || 0) > -7) {
        title = `🚨 ${h.name} 절대 손절!`;
        body = `${profitPct.toFixed(1)}% 도달. 즉시 청산`;
      } else if (profitPct <= -3 && (h.lastAlertedPct || 0) > -3) {
        title = `⚠️ ${h.name} 손절 검토`;
        body = `${profitPct.toFixed(1)}% 진입`;
      }

      if (title) {
        try {
          new Notification(title, { body, icon: '/icon.svg', tag: `kt-${h.id}` });
          setHoldings(prev => prev.map(x => x.id === h.id ? { ...x, lastAlertedPct: profitPct } : x));
        } catch (e) {}
      }
    });
  }, [holdings]);

  if (showKeySetup) {
    return <ApiKeySetup onSave={(k) => {
      setApiKey(k);
      setShowKeySetup(false);
    }}/>;
  }

  const tabs = [
    { id: 'home', icon: Ic.Home, label: '홈' },
    { id: 'portfolio', icon: Ic.Briefcase, label: '포폴' },
    { id: 'watchlist', icon: Ic.Star, label: '관심' },
    { id: 'journal', icon: Ic.Book, label: '일지' },
    { id: 'tools', icon: Ic.Calc, label: '도구' },
    { id: 'settings', icon: Ic.Settings, label: '설정' },
  ];

  return (
    <div className="min-h-screen bg-zinc-950 text-white">
      <div className="max-w-2xl mx-auto px-4 pt-4 safe-top">
        {tab === 'home' && <HomeTab setTab={setTab} holdings={holdings} journal={journal} checklist={checklist} setChecklist={setChecklist} marketData={marketData} refreshStatus={refreshStatus} backendUrl={backendUrl} apiKey={apiKey} onManualRefresh={refreshQuotes}/>}
        {tab === 'portfolio' && <PortfolioTab holdings={holdings} setHoldings={setHoldings} journal={journal} setJournal={setJournal} apiKey={apiKey} backendUrl={backendUrl} marketData={marketData}/>}
        {tab === 'watchlist' && <WatchlistPanel watchlist={watchlist} setWatchlist={setWatchlist} backendUrl={backendUrl} apiKey={apiKey}/>}
        {tab === 'journal' && <JournalTab journal={journal} setJournal={setJournal} holdings={holdings} setHoldings={setHoldings}/>}
        {tab === 'tools' && <ToolsTab apiKey={apiKey} holdings={holdings} journal={journal} backendUrl={backendUrl} watchlist={watchlist} setWatchlist={setWatchlist}/>}
        {tab === 'settings' && <SettingsTab apiKey={apiKey} setApiKey={setApiKey} holdings={holdings} setHoldings={setHoldings} journal={journal} setJournal={setJournal} checklist={checklist} setChecklist={setChecklist} backendUrl={backendUrl} setBackendUrl={setBackendUrl} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}/>}
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-sm border-t border-zinc-800 nav-safe">
        <div className="max-w-2xl mx-auto grid grid-cols-6">
          {tabs.map(t => {
            const I = t.icon;
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`py-2.5 flex flex-col items-center gap-0.5 transition ${
                  active ? 'text-red-400' : 'text-zinc-500'
                }`}>
                <I size={20}/>
                <span className="text-[10px] font-medium">{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'kt-trading-v2';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/'))));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
