// 빨강글씨 정량 점수
// ═══════════════════════════════════════════════
function calcScore({ close, ma5, ma20, ma60, rsi, volRatio, change }) {
  let score = 0;
  const reasons = [];

  if (rsi >= 50 && rsi <= 65) { score += 25; reasons.push({ pos: true, text: `RSI ${rsi.toFixed(0)} 건강 +25` }); }
  else if (rsi > 65 && rsi <= 75) { score += 15; reasons.push({ pos: true, text: `RSI ${rsi.toFixed(0)} 강세 +15` }); }
  else if (rsi > 80) { score -= 20; reasons.push({ pos: false, text: `RSI ${rsi.toFixed(0)} 과열 -20` }); }
  else if (rsi < 40) { score += 10; reasons.push({ pos: true, text: `RSI ${rsi.toFixed(0)} 저점 +10` }); }
  else { reasons.push({ pos: null, text: `RSI ${rsi.toFixed(0)} 중립` }); }

  if (ma5 > ma20 && ma20 > ma60) { score += 25; reasons.push({ pos: true, text: '정배열 +25' }); }
  else if (ma5 < ma20) { score -= 10; reasons.push({ pos: false, text: '5일선 이탈 -10' }); }
  else { reasons.push({ pos: null, text: '혼조 배열' }); }

  const dev = ((close / ma20 - 1) * 100);
  if (dev >= 3 && dev <= 15) { score += 20; reasons.push({ pos: true, text: `이격 ${dev.toFixed(1)}% 적정 +20` }); }
  else if (dev > 30) { score -= 25; reasons.push({ pos: false, text: `이격 ${dev.toFixed(1)}% 과열 -25` }); }
  else if (dev > 15) { score -= 5; reasons.push({ pos: false, text: `이격 ${dev.toFixed(1)}% 주의 -5` }); }
  else if (dev < 0) { reasons.push({ pos: null, text: `이격 ${dev.toFixed(1)}% 음의이격` }); }

  if (volRatio >= 5) { score += 20; reasons.push({ pos: true, text: `거래량 ${volRatio.toFixed(1)}배 폭증 +20` }); }
  else if (volRatio >= 3) { score += 15; reasons.push({ pos: true, text: `거래량 ${volRatio.toFixed(1)}배 +15` }); }
  else if (volRatio >= 2) { score += 10; reasons.push({ pos: true, text: `거래량 ${volRatio.toFixed(1)}배 +10` }); }
  else { reasons.push({ pos: null, text: `거래량 ${volRatio.toFixed(1)}배 평범` }); }

  if (change >= 5 && change <= 15) { score += 15; reasons.push({ pos: true, text: `등락 +${change.toFixed(1)}% 안정 +15` }); }
  else if (change > 15 && change <= 25) { score += 5; reasons.push({ pos: true, text: `등락 +${change.toFixed(1)}% 과열주의 +5` }); }
  else if (change > 25) { score -= 5; reasons.push({ pos: false, text: `등락 +${change.toFixed(1)}% 상한가 -5` }); }
  else if (change < 0) { reasons.push({ pos: false, text: `등락 ${change.toFixed(1)}% 하락` }); }

  let grade, gradeColor, bgColor;
  if (score >= 90) { grade = '🏆 추천'; gradeColor = 'text-green-400'; bgColor = 'bg-green-950 border-green-800'; }
  else if (score >= 70) { grade = '🟢 후보'; gradeColor = 'text-emerald-400'; bgColor = 'bg-emerald-950 border-emerald-800'; }
  else if (score >= 50) { grade = '🟡 관찰'; gradeColor = 'text-yellow-400'; bgColor = 'bg-yellow-950 border-yellow-800'; }
  else if (score >= 30) { grade = '🟠 보류'; gradeColor = 'text-orange-400'; bgColor = 'bg-orange-950 border-orange-800'; }
  else if (score >= 0) { grade = '🔴 위험'; gradeColor = 'text-red-400'; bgColor = 'bg-red-950 border-red-800'; }
  else { grade = '❌ 제외'; gradeColor = 'text-red-500'; bgColor = 'bg-red-950 border-red-800'; }

  return {
    score, grade, gradeColor, bgColor, reasons, dev,
    entryLow: ma5,
    entryHigh: close * 1.005,
    target1: close * 1.05,
    target2: close * 1.07,
    stop1: close * 0.97,
    stop2: ma20,
  };
}

// ═══════════════════════════════════════════════
// 보유 종목 가이드
// ═══════════════════════════════════════════════
function calcHoldingGuide(holding, current) {
  const buyPrice = holding.buyPrice;
  const profitPct = ((current.close - buyPrice) / buyPrice) * 100;
  const totalProfit = (current.close - buyPrice) * holding.qty;
  const score = calcScore(current);

  let action, actionColor, actionDetail, alertLevel;

  if (profitPct <= -7) {
    action = '🚨 즉시 손절'; actionColor = 'bg-red-600'; alertLevel = 'critical';
    actionDetail = `-7% 절대 손절선 도달 (${profitPct.toFixed(1)}%). 변명 없이 전량 청산.`;
  } else if (profitPct <= -3 && score.score < 50) {
    action = '⚠️ 손절 검토'; actionColor = 'bg-orange-600'; alertLevel = 'warning';
    actionDetail = `-3% 진입 + 정량 점수 약함. 50% 매도 + 잔여 -7%까지 대기.`;
  } else if (profitPct >= 7) {
    action = '🎯 2차 익절'; actionColor = 'bg-green-600'; alertLevel = 'profit';
    actionDetail = `+7% 도달! 잔여 50% 익절 또는 트레일링 스톱(-2%) 설정.`;
  } else if (profitPct >= 5) {
    action = '🎯 1차 익절'; actionColor = 'bg-emerald-600'; alertLevel = 'profit';
    actionDetail = `+5% 도달! 50% 분할매도 + 잔여 50% 추세 추종.`;
  } else if (profitPct >= 3) {
    action = '🟢 보유 + 트레일링'; actionColor = 'bg-blue-600'; alertLevel = 'good';
    actionDetail = `안정 수익 구간. 5일선 이탈 시 익절 검토.`;
  } else if (profitPct >= 0 && score.score >= 70) {
    action = '🟢 추세 유효, 보유'; actionColor = 'bg-blue-600'; alertLevel = 'good';
    actionDetail = `정량 점수 양호. 5일선 위 유지 시 보유 지속.`;
  } else if (profitPct >= -3) {
    action = '🟡 관망'; actionColor = 'bg-yellow-600'; alertLevel = 'neutral';
    actionDetail = `손익 중립. 5일선·MA20 추이 관찰.`;
  } else {
    action = '🟠 추가 관찰'; actionColor = 'bg-orange-600'; alertLevel = 'warning';
    actionDetail = `손실 진입. 정량 점수와 추세 동시 점검.`;
  }

  const cur = current.close;
  return {
    profitPct, totalProfit, score, alertLevel,
    action, actionColor, actionDetail,
    sell1Price: cur * 1.05,
    sell2Price: cur * 1.10,
    stopLossPrice: cur * 0.97,
    absStopPrice: cur * 0.93,
  };
}

function simulateScenario(currentPrice, openingPrice) {
  const gap = ((openingPrice - currentPrice) / currentPrice) * 100;
  const entryLimit = currentPrice * 1.005;

  if (gap > 2) {

// ═══════════════════════════════════════════════
// 매매 일지 통계
// ═══════════════════════════════════════════════
function calcJournalStats(journal) {
  if (!journal || journal.length === 0) {
    return {
      total: 0, wins: 0, losses: 0, winRate: 0,
      avgProfit: 0, avgLoss: 0, totalProfit: 0,
      avgHoldDays: 0, bestTrade: null, worstTrade: null,
      profitFactor: 0,
    };
  }

  const closed = journal.filter(t => t.sellPrice && t.sellDate);
  const wins = closed.filter(t => t.profitPct > 0);
  const losses = closed.filter(t => t.profitPct <= 0);

  const winRate = closed.length > 0 ? (wins.length / closed.length) * 100 : 0;
  const avgProfit = wins.length > 0 ? wins.reduce((s, t) => s + t.profitPct, 0) / wins.length : 0;
  const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + t.profitPct, 0) / losses.length : 0;
  const totalProfit = closed.reduce((s, t) => s + ((t.sellPrice - t.buyPrice) * t.qty), 0);

  const avgHoldDays = closed.length > 0
    ? closed.reduce((s, t) => s + daysBetween(t.buyDate, t.sellDate), 0) / closed.length
    : 0;

  const bestTrade = closed.length > 0 ? closed.reduce((b, t) => !b || t.profitPct > b.profitPct ? t : b, null) : null;
  const worstTrade = closed.length > 0 ? closed.reduce((w, t) => !w || t.profitPct < w.profitPct ? t : w, null) : null;

  const totalWin = wins.reduce((s, t) => s + t.profitPct, 0);
  const totalLoss = Math.abs(losses.reduce((s, t) => s + t.profitPct, 0));
  const profitFactor = totalLoss > 0 ? totalWin / totalLoss : 0;

  return {
    total: closed.length, wins: wins.length, losses: losses.length, winRate,
    avgProfit, avgLoss, totalProfit, avgHoldDays,
    bestTrade, worstTrade, profitFactor,
  };
}

// ═══════════════════════════════════════════════
// 매매 패턴 분석
// ═══════════════════════════════════════════════
function analyzePatterns(journal) {
  const closed = journal.filter(t => t.sellPrice && t.sellDate);
  if (closed.length < 3) return [];

  const insights = [];

  // RSI 분석
  const highRsi = closed.filter(t => t.entryRsi && t.entryRsi >= 70);
  if (highRsi.length >= 2) {
    const avgPct = highRsi.reduce((s, t) => s + t.profitPct, 0) / highRsi.length;
    insights.push({
      pattern: 'RSI 70+ 매수',
      count: highRsi.length,
      avgProfit: avgPct,
      verdict: avgPct < 0 ? '⚠️ 손실 패턴' : avgPct < 3 ? '🟡 저효율' : '🟢 좋음',
    });
  }

  const goodRsi = closed.filter(t => t.entryRsi && t.entryRsi >= 50 && t.entryRsi <= 65);
  if (goodRsi.length >= 2) {
    const avgPct = goodRsi.reduce((s, t) => s + t.profitPct, 0) / goodRsi.length;
    insights.push({
      pattern: 'RSI 50~65 매수',
      count: goodRsi.length,
      avgProfit: avgPct,
      verdict: avgPct > 3 ? '🟢 추천 패턴' : avgPct > 0 ? '🟡 보통' : '⚠️ 손실',
    });
  }

  // 보유 기간 분석
  const shortHold = closed.filter(t => daysBetween(t.buyDate, t.sellDate) <= 2);
  if (shortHold.length >= 2) {
    const avgPct = shortHold.reduce((s, t) => s + t.profitPct, 0) / shortHold.length;
    insights.push({
      pattern: '단기 (1~2일)',
      count: shortHold.length,
      avgProfit: avgPct,
      verdict: avgPct > 3 ? '🟢 좋음' : avgPct > 0 ? '🟡 보통' : '⚠️ 손실',
    });
  }

  return insights;
}

// 종합 손익 차트 (인라인 SVG)
// ═══════════════════════════════════════════════
function MiniLineChart({ data, width = 300, height = 80, color = '#ef4444' }) {
  if (!data || data.length < 2) return <div className="h-20 flex items-center justify-center text-zinc-600 text-xs">데이터 부족</div>;

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 20) - 10;
    return `${x},${y}`;
  }).join(' ');

  const last = data[data.length - 1];
  const first = data[0];
  const isUp = last >= first;
  const lineColor = isUp ? '#ef4444' : '#3b82f6';

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="chartGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${height} ${points} ${width},${height}`} fill="url(#chartGrad)"/>
      <polyline points={points} fill="none" stroke={lineColor} strokeWidth="2"/>
    </svg>
  );
}

// 도넛 차트 (종목 비중)
function DonutChart({ data, size = 160 }) {
  if (!data || data.length === 0) return null;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return null;

  const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16', '#f97316'];
  const radius = size / 2 - 10;
  const cx = size / 2, cy = size / 2;

  let cumAngle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const angle = (d.value / total) * Math.PI * 2;
    const x1 = cx + radius * Math.cos(cumAngle);
    const y1 = cy + radius * Math.sin(cumAngle);
    cumAngle += angle;
    const x2 = cx + radius * Math.cos(cumAngle);
    const y2 = cy + radius * Math.sin(cumAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const path = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    return { path, color: colors[i % colors.length], pct: (d.value / total) * 100, label: d.label };
  });

  return (
    <div className="flex items-center gap-4">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} stroke="#0a0a0a" strokeWidth="2"/>)}
        <circle cx={cx} cy={cy} r={radius * 0.55} fill="#18181b"/>
      </svg>
      <div className="flex-1 space-y-1.5 text-xs">
        {slices.slice(0, 6).map((s, i) => (
          <div key={i} className="flex items-center gap-2">
            <div className="w-2.5 h-2.5 rounded-sm" style={{background: s.color}}></div>
            <div className="text-zinc-300 truncate flex-1">{s.label}</div>
            <div className="text-zinc-500 font-mono">{s.pct.toFixed(0)}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HBarChart({ data, height = 200 }) {
  if (!data || data.length === 0) return null;
  const maxAbs = Math.max(...data.map(d => Math.abs(d.value)), 1);

  return (
    <div className="space-y-2">
      {data.map((d, i) => {
        const pct = (Math.abs(d.value) / maxAbs) * 100;

// 큰 라인 차트 (누적 수익)
// ═══════════════════════════════════════════════
function BigLineChart({ data, labels, height = 180, baseValue = 0 }) {
  if (!data || data.length < 2) {
    return <div className="h-44 flex items-center justify-center text-zinc-600 text-sm bg-zinc-950 rounded-lg">데이터 부족</div>;
  }
  const width = 340;
  const padding = 30;
  const chartW = width - padding * 2;
  const chartH = height - padding;

  const allValues = [...data, baseValue];
  const min = Math.min(...allValues);
  const max = Math.max(...allValues);
  const range = max - min || 1;

  const points = data.map((v, i) => {
    const x = padding + (i / (data.length - 1)) * chartW;
    const y = padding/2 + chartH - ((v - min) / range) * chartH;
    return { x, y, v };
  });

  const last = data[data.length - 1];
  const isUp = last >= baseValue;
  const lineColor = isUp ? '#ef4444' : '#3b82f6';
  const baseY = padding/2 + chartH - ((baseValue - min) / range) * chartH;

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} className="bg-zinc-950 rounded-lg">
      <defs>
        <linearGradient id="bigGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity="0.4"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* 격자 */}
      {[0.25, 0.5, 0.75].map(p => (
        <line key={p} x1={padding} x2={width - padding}
          y1={padding/2 + chartH * p} y2={padding/2 + chartH * p}
          stroke="#27272a" strokeDasharray="2 4"/>
      ))}
      {/* 기준선 (0원) */}
      <line x1={padding} x2={width - padding} y1={baseY} y2={baseY}
        stroke="#71717a" strokeDasharray="3 3" strokeWidth="0.5"/>

      {/* 영역 채우기 */}
      <polygon
        points={`${padding},${baseY} ${points.map(p => `${p.x},${p.y}`).join(' ')} ${width-padding},${baseY}`}
        fill="url(#bigGrad)"/>
      {/* 라인 */}
      <polyline points={points.map(p => `${p.x},${p.y}`).join(' ')}
        fill="none" stroke={lineColor} strokeWidth="2.5"/>
      {/* 마지막 포인트 */}
      <circle cx={points[points.length-1].x} cy={points[points.length-1].y} r="4" fill={lineColor}/>
      <circle cx={points[points.length-1].x} cy={points[points.length-1].y} r="8" fill={lineColor} opacity="0.3"/>

      {/* Y축 라벨 */}
      <text x="5" y={padding/2 + 4} fill="#71717a" fontSize="9" fontFamily="monospace">{fmtKR(max)}</text>
      <text x="5" y={height - 5} fill="#71717a" fontSize="9" fontFamily="monospace">{fmtKR(min)}</text>
      {/* X축 (시작/끝) */}
      {labels && labels.length > 0 && (
        <>
          <text x={padding} y={height - 5} fill="#52525b" fontSize="8" fontFamily="monospace">{labels[0]}</text>
          <text x={width - padding - 30} y={height - 5} fill="#52525b" fontSize="8" fontFamily="monospace">{labels[labels.length-1]}</text>
        </>
      )}
    </svg>
  );
}

  // 최근 거래 3건
  const recentTrades = journal.filter(t => t.sellPrice).sort((a, b) => new Date(b.sellDate) - new Date(a.sellDate)).slice(0, 3);

  // ── 오늘의 추천종목 자동 스캔 ──────────────────────────
  const [todayPicks, setTodayPicks] = useState([]);

  const [picksMode, setPicksMode] = useState('livermore');

  // 캐시 키: 3시간 단위 (같은 날이라도 9시/12시/15시/18시에 자동 갱신)
  const picksCacheKey = (() => {
    const now = new Date();
    const slot = Math.floor(now.getHours() / 3); // 0~7
    return `kt_picks_${todayKey}_s${slot}`;
  })();

  const [picksScanTotal, setPicksScanTotal] = React.useState(Object.keys(corpCodeMap).length);

  const [macro, setMacro] = useState(null);
  useEffect(() => {
    if (!backendUrl) return;
    fetch(`${backendUrl}/api/macro`).then(r => r.json()).then(d => setMacro(d)).catch(() => {});
  }, [backendUrl]);

  const runPicksScan = async (cacheKey) => {
    setPicksLoading(true);

    // /api/movers로 오늘의 시장 활성 종목 동적 조회 (전종목 스캔)
    let stocks;
    try {
      const mr = await fetch(`${backendUrl}/api/movers`);

        stocks = md.candidates.map(s => ({
          ...s,
          sector: corpCodeMap[s.code]?.sector || '기타',
          corp:   corpCodeMap[s.code]?.corp   || '',
        }));
      }
    } catch {}
    // 폴백: 기존 corpCodeMap (30개)
    if (!stocks) stocks = Object.entries(corpCodeMap).map(([code, info]) => ({ code, ...info }));
    setPicksScanTotal(stocks.length);

    const all = [];
    for (let i = 0; i < stocks.length; i += 5) {
      const batch = stocks.slice(i, i + 5);
      const fetched = await Promise.all(batch.map(async s => {
        try {
          const dartParam = apiKey ? `&dartKey=${encodeURIComponent(apiKey)}` : '';
          const corpParam = s.corp ? `&corp=${s.corp}` : '';
          const sectorParam = s.sector ? `&sector=${encodeURIComponent(s.sector)}` : '';

          if (!r.ok) return null;
          const d = await r.json();
          if (d.error) return null;
          return { ...s, ...d, name: s.name || d.name, market: s.market || d.market };
        } catch { return null; }
      }));
      all.push(...fetched.filter(Boolean));
    }
    try { localStorage.setItem(cacheKey, JSON.stringify(all)); } catch {}
    setTodayPicks(all);
    setPicksLoading(false);
  };

  useEffect(() => {
    if (!backendUrl) return;
    const cached = localStorage.getItem(picksCacheKey);
    if (cached) { try { setTodayPicks(JSON.parse(cached)); return; } catch {} }
    runPicksScan(picksCacheKey);
  }, [backendUrl, picksCacheKey]);

      const totalRank  = mainScore + freshBonus + macdBonus + (isBuy ? 10 : 0);
      const g = picksMode === 'livermore' ? r.lGrade : r.pGrade;
      const qualified = g === '🏆 추천' || g === '🟢 후보';
      return { ...r, totalRank, qualified };
    });

    // 자격 있는 종목만, 랭크 순으로
    const qualified = scored.filter(r => r.qualified).sort((a, b) => b.totalRank - a.totalRank);

    // 섹터 분산: 같은 섹터 최대 2개
    const sectorCount = {};

    for (const r of qualified) {
      const sector = r.sector || '기타';
      if ((sectorCount[sector] || 0) >= 2) continue;
      sectorCount[sector] = (sectorCount[sector] || 0) + 1;
      result.push(r);
      if (result.length >= 8) break;
    }
    return result;
  }, [todayPicks, picksMode]);

  const refreshPicks = () => {
    // 현재 슬롯 캐시 삭제 후 재스캔
    localStorage.removeItem(picksCacheKey);
    setTodayPicks([]);
    runPicksScan(picksCacheKey);
  };

  return (
    <div className="space-y-4 safe-bottom">
      {/* 헤더 */}
      <div className="bg-gradient-to-br from-zinc-900 via-zinc-900 to-black border border-zinc-800 rounded-2xl p-5 relative overflow-hidden">

function PortfolioTab({ holdings, setHoldings, journal, setJournal, apiKey, backendUrl, marketData }) {
  const [view, setView] = useState('list'); // list | detail | add | compare
  const [selected, setSelected] = useState(null);
  const [compareIds, setCompareIds] = useState([]);
  const [analysisRefreshKey, setAnalysisRefreshKey] = useState(0);
  const [batchLoading, setBatchLoading] = useState(false);
  const [batchProgress, setBatchProgress] = useState({ done: 0, total: 0 });

  const runBatchAnalysis = async (force = false) => {
    if (!backendUrl || batchLoading || holdings.length === 0) return;
    const toFetch = holdings.filter(h => {
      if (force) return true;
      const code = h.code.replace(/^A/, '');
      try {
        const c = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
        const entry = c[code];
        return !entry || Date.now() - entry.cachedAt > 3600000;
      } catch { return true; }
    });
    if (toFetch.length === 0) return;
    setBatchLoading(true);
    setBatchProgress({ done: 0, total: toFetch.length });
    for (let i = 0; i < toFetch.length; i++) {
      const code = toFetch[i].code.replace(/^A/, '');
      try {
        const r = await fetch(`${backendUrl}/api/analysis?code=${code}`);
        if (r.ok) {
          const d = await r.json();
          if (!d.error) {
            const cache = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
            cache[code] = { data: d, cachedAt: Date.now() };
            localStorage.setItem(STORAGE_KEYS.ANALYSIS_CACHE, JSON.stringify(cache));
            if (d.close) setHoldings(prev => prev.map(h => h.code.replace(/^A/, '') === code ? { ...h, currentPrice: d.close } : h));
            setAnalysisRefreshKey(k => k + 1);
          }
        }
      } catch {}
      setBatchProgress({ done: i + 1, total: toFetch.length });
      if (i < toFetch.length - 1) await new Promise(res => setTimeout(res, 400));
    }
    setBatchLoading(false);
  };

  useEffect(() => { runBatchAnalysis(false); }, [backendUrl]);

  const portfolioStats = useMemo(() => {
    const inv = holdings.reduce((s, h) => s + h.buyPrice * h.qty, 0);
    const cur = holdings.reduce((s, h) => s + (h.currentPrice || h.buyPrice) * h.qty, 0);
    return { inv, cur, profit: cur - inv, pct: inv > 0 ? ((cur - inv) / inv) * 100 : 0 };
  }, [holdings]);

  const addHolding = (h) => {
    const id = Date.now();
    setHoldings([...holdings, { ...h, id, journalId: id }]);
    setJournal(prev => [...prev, {
      id, code: h.code, name: h.name,
      buyPrice: h.buyPrice, buyDate: h.buyDate, qty: h.qty,
      portfolio: h.portfolio || 'long', entryRsi: h.entryRsi || null,
      status: 'open', sellPrice: null, sellDate: null, note: '', profitPct: null,
    }]);
    setView('list');
  };

  const deleteHolding = (id) => {
    if (confirm('이 종목을 삭제하시겠습니까?')) {
      const h = holdings.find(x => x.id === id);
      setHoldings(holdings.filter(x => x.id !== id));
      if (h?.journalId) setJournal(prev => prev.filter(j => j.id !== h.journalId));
      setSelected(null);
      setView('list');
    }
  };

  const updateHolding = (id, updates) => {
    setHoldings(holdings.map(h => h.id === id ? { ...h, ...updates } : h));
    if (selected && selected.id === id) setSelected({ ...selected, ...updates });
  };

  const linkToJournal = (h) => {
    const jid = Date.now();
    setHoldings(prev => prev.map(x => x.id === h.id ? { ...x, journalId: jid } : x));
    setJournal(prev => [...prev, {
      id: jid, code: h.code, name: h.name,
      buyPrice: h.buyPrice, buyDate: h.buyDate || todayISO(), qty: h.qty,
      portfolio: h.portfolio || 'long', entryRsi: h.entryRsi || null,
      status: 'open', sellPrice: null, sellDate: null, note: '', profitPct: null,
    }]);
  };

  // 매도 → 일지 기록 (매수 시 생성된 open 엔트리 업데이트, 없으면 신규 생성)
  const sellHolding = (id, sellPrice, sellDate, note = '') => {
    const h = holdings.find(x => x.id === id);
    if (!h) return;
    const profitPct = ((sellPrice - h.buyPrice) / h.buyPrice) * 100;
    if (h.journalId) {
      setJournal(journal.map(j => j.id === h.journalId
        ? { ...j, sellPrice, sellDate, note, profitPct, status: 'closed' }
        : j
      ));
    } else {
      setJournal([...journal, {
        id: Date.now(),
        code: h.code, name: h.name,
        buyPrice: h.buyPrice, buyDate: h.buyDate, qty: h.qty,
        sellPrice, sellDate, note, profitPct,
        portfolio: h.portfolio,
        entryRsi: h.entryRsi || null,
      }]);
    }
    setHoldings(holdings.filter(x => x.id !== id));
    setSelected(null);
    setView('list');
  };

  if (view === 'detail' && selected) {
    return <HoldingDetail
      holding={selected}
      onBack={() => { setSelected(null); setView('list'); }}
      onDelete={() => deleteHolding(selected.id)}
      onUpdate={(u) => updateHolding(selected.id, u)}
      onSell={(price, date, note) => sellHolding(selected.id, price, date, note)}
      backendUrl={backendUrl}
      marketData={marketData}
    />;
  }

  if (view === 'add') {
    return <AddHoldingForm onAdd={addHolding} onCancel={() => setView('list')}/>;
  }

  if (view === 'compare' && compareIds.length > 0) {
    const compareItems = holdings.filter(h => compareIds.includes(h.id));
    return <CompareView holdings={compareItems} onBack={() => { setView('list'); setCompareIds([]); }}/>;
  }

  return (
    <div className="space-y-4 safe-bottom">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-2xl font-bold text-white">포트폴리오</div>
          <div className="text-xs text-zinc-500 mt-0.5">{holdings.length}개 보유</div>
        </div>
        <div className="flex gap-2 items-center">
          {batchLoading && (
            <span className="text-[11px] text-zinc-400 animate-pulse">
              분석 {batchProgress.done}/{batchProgress.total}
            </span>
          )}
          {!batchLoading && holdings.length > 0 && (
            <button onClick={() => runBatchAnalysis(true)} disabled={batchLoading}
              className="text-[11px] text-zinc-400 hover:text-white flex items-center gap-1 transition disabled:opacity-40">
              <Ic.RefreshCw size={12}/> 전체 분석
            </button>
          )}
          {compareIds.length > 0 && (
            <button onClick={() => setView('compare')}
              className="bg-purple-600 text-white rounded-xl px-3 py-2 flex items-center gap-1 transition">
              <Ic.Layers size={14}/>
              <span className="text-xs font-semibold">비교 {compareIds.length}</span>
            </button>
          )}
          <button onClick={() => setView('add')}
            className="bg-red-600 text-white rounded-xl px-4 py-2 flex items-center gap-2 transition">
            <Ic.Plus size={16}/>
            <span className="text-sm font-semibold">추가</span>
          </button>
        </div>
      </div>

      {/* 포트폴리오 요약 */}
      {holdings.length > 0 && (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-xs text-zinc-500 mb-1">총 평가액</div>
              <div className="text-xl font-bold text-white font-mono">₩{fmt(portfolioStats.cur)}</div>
            </div>
            <div>
              <div className="text-xs text-zinc-500 mb-1">손익</div>
              <div className={`text-xl font-bold font-mono ${portfolioStats.profit >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                {fmtPct(portfolioStats.pct)}
              </div>
            </div>
          </div>
          {holdings.length >= 2 && (
            <div className="mt-3 pt-3 border-t border-zinc-800 space-y-4">
              <div>
                <div className="text-xs text-zinc-500 mb-2">종목 비중</div>
                <DonutChart data={holdings.map(h => ({
                  label: h.name,
                  value: (h.currentPrice || h.buyPrice) * h.qty,
                }))}/>
              </div>
              {/* 섹터 분포 */}
              {(() => {
                const bySector = {};
                holdings.forEach(h => {
                  const info = corpCodeMap[h.code];
                  const sector = info?.sector || h.sector || '기타';
                  const val = (h.currentPrice || h.buyPrice) * h.qty;
                  bySector[sector] = (bySector[sector] || 0) + val;
                });
                const total = Object.values(bySector).reduce((s, v) => s + v, 0) || 1;
                const sectors = Object.entries(bySector).sort((a, b) => b[1] - a[1]);
                const colors = ['bg-red-500','bg-blue-500','bg-emerald-500','bg-yellow-500','bg-purple-500','bg-pink-500','bg-cyan-500'];
                if (sectors.length < 2) return null;
                return (
                  <div>
                    <div className="text-xs text-zinc-500 mb-2">섹터 분포</div>
                    <div className="flex h-2 rounded-full overflow-hidden gap-0.5 mb-2">
                      {sectors.map(([, v], i) => (
                        <div key={i} className={`${colors[i % colors.length]} h-full`} style={{width: `${(v/total)*100}%`}}/>
                      ))}
                    </div>
                    <div className="grid grid-cols-2 gap-1">
                      {sectors.map(([s, v], i) => (
                        <div key={s} className="flex items-center gap-1.5 text-xs">
                          <div className={`w-2 h-2 rounded-sm flex-shrink-0 ${colors[i % colors.length]}`}/>
                          <span className="text-zinc-400 truncate">{s}</span>
                          <span className="text-zinc-500 ml-auto font-mono">{((v/total)*100).toFixed(0)}%</span>
                        </div>
                      ))}
                    </div>
                    {sectors.length === 1 && (
                      <div className="text-xs text-yellow-500 mt-1">⚠️ 단일 섹터 집중 — 분산 투자 권장</div>
                    )}
                  </div>
                );
              })()}
              {/* 리스크 지표 */}
              {(() => {
                const profits = holdings.map(h => {
                  const cur = h.currentPrice || h.buyPrice;
                  return ((cur - h.buyPrice) / h.buyPrice) * 100;
                });
                const winners = profits.filter(p => p > 0).length;
                const maxProfit = Math.max(...profits);
                const maxLoss = Math.min(...profits);
                return (
                  <div className="grid grid-cols-3 gap-2 text-center text-xs">
                    <div className="bg-zinc-950 rounded-lg p-2">
                      <div className="text-zinc-500">승률</div>
                      <div className={`font-bold mt-0.5 ${winners/profits.length >= 0.6 ? 'text-emerald-400' : 'text-yellow-400'}`}>{Math.round(winners/profits.length*100)}%</div>
                    </div>
                    <div className="bg-zinc-950 rounded-lg p-2">
                      <div className="text-zinc-500">최대이익</div>
                      <div className="font-bold mt-0.5 text-red-400">+{maxProfit.toFixed(1)}%</div>
                    </div>
                    <div className="bg-zinc-950 rounded-lg p-2">
                      <div className="text-zinc-500">최대손실</div>
                      <div className="font-bold mt-0.5 text-blue-400">{maxLoss.toFixed(1)}%</div>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {holdings.length === 0 ? (
        <div className="bg-zinc-900 border border-zinc-800 border-dashed rounded-2xl p-10 text-center">
          <Ic.Briefcase size={48} className="text-zinc-700 mx-auto mb-3"/>
          <div className="text-zinc-400 text-sm mb-1">보유 종목이 없습니다</div>
          <div className="text-zinc-600 text-xs">"+ 추가" 버튼으로 종목을 등록하세요</div>
        </div>
      ) : (
        <div className="space-y-3">
          {holdings.map(h => {
            const linked = h.journalId && journal.some(j => j.id === h.journalId);
            return (
              <div key={h.id} className="space-y-1">
                <HoldingCard
                  holding={h}
                  isCompareMode={compareIds.length > 0}
                  isSelected={compareIds.includes(h.id)}
                  refreshKey={analysisRefreshKey}
                  onClick={() => {
                    if (compareIds.length > 0) {
                      if (compareIds.includes(h.id)) {
                        setCompareIds(compareIds.filter(id => id !== h.id));
                      } else if (compareIds.length < 3) {
                        setCompareIds([...compareIds, h.id]);
                      } else {
                        alert('최대 3개까지 비교 가능');
                      }
                    } else {
                      setSelected(h);
                      setView('detail');
                    }
                  }}
                  onLongPress={() => {
                    if (compareIds.length === 0) setCompareIds([h.id]);
                  }}
                />
                {!linked && (
                  <button
                    onClick={() => linkToJournal(h)}
                    className="w-full text-[11px] text-amber-400 bg-amber-950/30 border border-amber-900/40 hover:bg-amber-900/40 rounded-lg py-1 flex items-center justify-center gap-1 transition">
                    <Ic.BookOpen size={11}/> 일지 연결 안 됨 — 탭하여 연결
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {compareIds.length > 0 && compareIds.length < 3 && (
        <div className="text-center text-xs text-zinc-500">
          비교할 종목을 더 선택 ({compareIds.length}/3) · <button onClick={() => setCompareIds([])} className="text-red-400">취소</button>
        </div>
      )}
    </div>
  );
}

// 보유 종목 카드
// ═══════════════════════════════════════════════
function HoldingCard({ holding, onClick, onLongPress, isCompareMode, isSelected, refreshKey }) {
  const current = holding.currentPrice || holding.buyPrice;
  const profitPct = ((current - holding.buyPrice) / holding.buyPrice) * 100;
  const profit = (current - holding.buyPrice) * holding.qty;
  const upRed = profitPct >= 0;
  const longPressTimer = useRef(null);

  const handleStart = () => {
    longPressTimer.current = setTimeout(() => onLongPress && onLongPress(), 500);
  };
  const handleEnd = () => clearTimeout(longPressTimer.current);

  // 알림 레벨
  let alertBorder = 'border-zinc-800';
  if (profitPct >= 7) alertBorder = 'border-green-700';
  else if (profitPct >= 5) alertBorder = 'border-emerald-700';
  else if (profitPct <= -7) alertBorder = 'border-red-700 animate-pulse-red';
  else if (profitPct <= -3) alertBorder = 'border-orange-700';

  return (
    <button onClick={onClick}
      onTouchStart={handleStart} onTouchEnd={handleEnd}
      onMouseDown={handleStart} onMouseUp={handleEnd} onMouseLeave={handleEnd}
      className={`w-full bg-zinc-900 border ${isSelected ? 'border-purple-500' : alertBorder} rounded-2xl p-4 text-left transition relative`}>
      {isCompareMode && (
        <div className={`absolute top-3 right-3 w-6 h-6 rounded-full border-2 flex items-center justify-center ${
          isSelected ? 'bg-purple-500 border-purple-500' : 'border-zinc-600'
        }`}>
          {isSelected && <Ic.Check size={14} className="text-white"/>}
        </div>
      )}
      <div className="flex items-start justify-between mb-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-0.5 flex-wrap">
            <div className="text-white font-bold truncate">{holding.name}</div>
            <div className="text-xs text-zinc-500 font-mono">{holding.code}</div>
          </div>
          <div className="text-xs text-zinc-500">{holding.qty}주 × ₩{fmt(holding.buyPrice)}</div>
        </div>
        {!isCompareMode && <Ic.ChevronRight size={20} className="text-zinc-600"/>}
      </div>
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs text-zinc-500 mb-0.5">현재가</div>
          <div className="text-lg font-bold text-white font-mono">₩{fmt(current)}</div>
        </div>
        <div className={`text-right ${upRed ? 'text-red-400' : 'text-blue-400'}`}>
          <div className="text-xs flex items-center justify-end gap-0.5">
            {upRed ? <Ic.ArrowUp size={12}/> : <Ic.ArrowDown size={12}/>}
            {fmtPct(profitPct)}
          </div>
          <div className="text-sm font-semibold font-mono">
            {profit >= 0 ? '+' : '-'}₩{fmt(Math.abs(profit))}
          </div>
        </div>
      </div>
      {(() => {
        try {
          const c = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
          const entry = c[holding.code];
          const cd = entry && Date.now() - entry.cachedAt < 3600000 ? entry.data : null;
          if (!cd) return null;
          const sig = cd.combinedSignal;
          const sigColor = sig?.signal === 'BUY' ? 'text-red-400' : sig?.signal === 'SELL' ? 'text-blue-400' : 'text-zinc-500';
          const sigLabel = sig?.signal === 'BUY' ? '🚀 매수' : sig?.signal === 'SELL' ? '🔻 매도' : '⏸ 관망';
          return (
            <div className="mt-2.5 pt-2.5 border-t border-zinc-800/60 flex items-center gap-3 text-xs">
              <span className={`font-bold ${cd.lScore >= 70 ? 'text-red-400' : cd.lScore >= 50 ? 'text-yellow-400' : 'text-zinc-500'}`}>리버 {cd.lScore}점</span>
              <span className="text-zinc-700">·</span>
              <span className={`font-bold ${cd.pScore >= 70 ? 'text-emerald-400' : cd.pScore >= 50 ? 'text-yellow-400' : 'text-zinc-500'}`}>린치 {cd.pScore}점</span>
              <span className="text-zinc-700">·</span>
              <span className={`font-bold ${sigColor}`}>{sigLabel}</span>
              {sig && <span className="text-zinc-600 ml-auto">{sig.buyPoints}/{sig.totalBuyCriteria}</span>}
            </div>
          );
        } catch { return null; }
      })()}
    </button>
  );
}

// 종목 검색 (통합 자동완성)
// — 로컬 즉시검색 + 백엔드/Yahoo Finance 전종목 검색
// — onSelect(stock), onChange(rawValue), onEnter(code) 콜백
// ═══════════════════════════════════════════════
function StockSearch({ onSelect, value, onChange, onEnter, placeholder }) {
  const [query, setQuery] = useState(value || '');
  const [localHits, setLocalHits] = useState([]);
  const [apiHits, setApiHits]     = useState([]);
  const [apiLoading, setApiLoading] = useState(false);
  const [apiSource, setApiSource]   = useState('');  // 'backend' | 'yahoo'
  const [showDropdown, setShowDropdown] = useState(false);
  const timer = useRef(null);

  const hits = apiHits.length > 0 ? apiHits : localHits;

  const handleChange = (val) => {
    setQuery(val);
    onChange && onChange(val);
    setApiHits([]); setApiSource('');
    setShowDropdown(true);
    clearTimeout(timer.current);

    const q = val.trim().toLowerCase();
    if (!q) { setLocalHits([]); return; }

    // 즉시: 로컬 corpCodeList 검색
    setLocalHits(
      corpCodeList.filter(s =>
        s.code.includes(q) || s.name.toLowerCase().includes(q) ||
        (s.sector && s.sector.toLowerCase().includes(q))
      ).slice(0, 8)
    );

    // 디바운스: 백엔드 KRX 전종목 검색 (백엔드 URL 설정 시)
    const backendUrl = localStorage.getItem(STORAGE_KEYS.BACKEND_URL) || '';
    if (backendUrl) {
      timer.current = setTimeout(async () => {
        setApiLoading(true);
        try {
          const r = await fetch(`${backendUrl}/api/search?q=${encodeURIComponent(val.trim())}`);
          if (r.ok) { const d = await r.json(); setApiHits(d.results || []); setApiSource('backend'); }
        } catch {}
        setApiLoading(false);
      }, 400);
    }
  };

  const handleSelect = (stock) => {
    setQuery(`${stock.name} (${stock.code})`);
    setLocalHits([]); setApiHits([]);
    setShowDropdown(false);
    onSelect(stock);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') {
      if (hits.length > 0) {
        handleSelect(hits[0]);
      } else {
        const raw = query.trim().replace(/^A/, '');
        if (/^\d{5,6}$/.test(raw)) {
          setShowDropdown(false);
          onEnter ? onEnter(raw) : onSelect({ code: raw, name: raw, market: '', sector: '' });
        }
      }
    }
    if (e.key === 'Escape') { setLocalHits([]); setApiHits([]); setShowDropdown(false); }
  };

  return (
    <div className="relative">
      <div className="relative">
        <input type="text" value={query}
          onChange={e => handleChange(e.target.value)}
          onFocus={() => { setShowDropdown(true); if (query.trim()) handleChange(query); }}
          onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
          onKeyDown={handleKeyDown}
          placeholder={placeholder || '종목명 또는 코드 (예: 하이닉스, 005930)'}
          className="w-full bg-zinc-950 border border-zinc-800 rounded-lg pl-9 pr-3 py-2.5 text-white focus:border-red-700 outline-none text-sm"/>
        <Ic.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"/>
      </div>
      {showDropdown && (hits.length > 0 || apiLoading) && (
        <div className="absolute top-full mt-1 left-0 right-0 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl z-50 max-h-64 overflow-y-auto">
          {apiLoading && hits.length === 0 && (
            <div className="px-3 py-2 text-xs text-zinc-500 animate-pulse">전종목 검색 중...</div>
          )}
          {hits.map(s => (
            <button key={s.code} onMouseDown={() => handleSelect(s)}
              className="w-full text-left p-2.5 hover:bg-zinc-800 border-b border-zinc-800 last:border-b-0 transition">
              <div className="flex items-center justify-between gap-2">
                <div className="min-w-0">
                  <div className="text-white text-sm font-semibold truncate">{s.name}</div>
                  <div className="text-xs text-zinc-500">
                    {s.code}
                    {s.market && <> · <span className={s.market === 'KOSPI' ? 'text-blue-400' : 'text-emerald-400'}>{s.market}</span></>}
                    {s.sector && ` · ${s.sector}`}
                  </div>
                </div>
                {s.price > 0 && (
                  <div className="text-right shrink-0">
                    <div className="text-xs text-white font-mono">{s.price.toLocaleString('ko-KR')}원</div>
                    <div className={`text-xs font-bold ${s.changeRate >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                      {s.changeRate >= 0 ? '+' : ''}{s.changeRate?.toFixed(2)}%
                    </div>
                  </div>
                )}
              </div>
            </button>
          ))}
        </div>
      )}
      {showDropdown && query.trim().length >= 2 && hits.length === 0 && !apiLoading && (
        <div className="absolute top-full mt-1 left-0 right-0 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl z-10 p-3">
          <div className="text-zinc-400 text-xs font-semibold mb-1">"{query.trim()}" 검색 결과 없음</div>
          <a href={`https://finance.naver.com/search/searchList.nhn?query=${encodeURIComponent(query.trim())}`}
             target="_blank" rel="noopener noreferrer"
             className="block text-blue-400 text-xs py-1 hover:text-blue-300">
            네이버 금융에서 "{query.trim()}" 검색 → 코드 확인 후 직접 입력
          </a>
          <div className="text-zinc-600 text-xs mt-1 pt-1 border-t border-zinc-800">
            설정 → 실시간 탭에서 백엔드 URL 등록 시 앱 내 전 종목 검색 가능
          </div>
        </div>
      )}
    </div>
  );
}

            let recommendation;
            if (profitPct >= 7) recommendation = { text: '🎯 2차 익절', color: 'text-green-400' };
            else if (profitPct >= 5) recommendation = { text: '🎯 1차 익절', color: 'text-emerald-400' };
            else if (profitPct <= -7) recommendation = { text: '🚨 즉시 손절', color: 'text-red-400' };
            else if (profitPct <= -3) recommendation = { text: '⚠️ 손절 검토', color: 'text-orange-400' };
            else recommendation = { text: '🟢 보유', color: 'text-blue-400' };
            return (

                <div className="text-white truncate flex-1">{h.name}</div>
                <div className={`font-bold ${recommendation.color} text-xs`}>{recommendation.text}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// HOLDING DETAIL (상세 분석 + 매도 + 시나리오 + Dart)
// ═══════════════════════════════════════════════
function HoldingDetail({ holding, onBack, onDelete, onUpdate, onSell, backendUrl, marketData }) {
  const [liveAnalysis, setLiveAnalysis] = useState(null);
  const [analysisLoading, setAnalysisLoading] = useState(false);
  const [analysisError, setAnalysisError] = useState('');
  const [analysisFromCache, setAnalysisFromCache] = useState(false);
  const [aiGuide, setAiGuide] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [showSell, setShowSell] = useState(false);
  const [showScenario, setShowScenario] = useState(false);
  const [openingPrice, setOpeningPrice] = useState(holding.currentPrice || holding.buyPrice);
  const [sellPrice, setSellPrice] = useState(holding.currentPrice || holding.buyPrice);
  const [sellDate, setSellDate] = useState(todayISO());
  const [sellNote, setSellNote] = useState('');

  const buyDate = new Date(holding.buyDate);
  const today = new Date();
  const daysHeld = Math.floor((today - buyDate) / (1000 * 60 * 60 * 24));
  const corp = corpCodeMap[holding.code];

  const currentDisplay = liveAnalysis?.close || holding.currentPrice || holding.buyPrice;
  const profitPct = ((currentDisplay - holding.buyPrice) / holding.buyPrice) * 100;
  const totalProfit = (currentDisplay - holding.buyPrice) * holding.qty;
  const sell1Price = currentDisplay * 1.05;
  const sell2Price = currentDisplay * 1.10;
  const stopLossPrice = currentDisplay * 0.97;
  const absStopPrice = currentDisplay * 0.93;

  const scenario = simulateScenario(currentDisplay, openingPrice);

  const loadAnalysis = async (forceRefresh = false) => {
    const trimCode = holding.code.replace(/^A/, '');
    if (!forceRefresh) {
      try {
        const c = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
        const entry = c[trimCode];
        if (entry && Date.now() - entry.cachedAt < 3600000) {
          setLiveAnalysis(entry.data);
          setAnalysisFromCache(true);
          return;
        }
      } catch {}
    }
    if (!backendUrl) { setAnalysisError('백엔드 URL 미설정 — 설정 탭에서 입력하세요'); return; }
    setAnalysisLoading(true);
    setAnalysisError('');
    try {
      const r = await fetch(`${backendUrl}/api/analysis?code=${trimCode}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      try {
        const cache = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
        const keys = Object.keys(cache);
        if (keys.length >= 30) delete cache[keys[0]];
        cache[trimCode] = { data: d, cachedAt: Date.now() };
        localStorage.setItem(STORAGE_KEYS.ANALYSIS_CACHE, JSON.stringify(cache));
      } catch {}
      setLiveAnalysis(d);
      setAnalysisFromCache(false);
      if (d.close) onUpdate({ currentPrice: d.close });
      loadAiGuide(d);
    } catch (e) {
      setAnalysisError(e.message);
    }
    setAnalysisLoading(false);
  };

  useEffect(() => { loadAnalysis(); }, []);

  const loadAiGuide = async (analysis) => {
    if (!backendUrl) return;
    setAiLoading(true);
    try {
      const cur = analysis?.close || holding.currentPrice || holding.buyPrice;
      const pct = ((cur - holding.buyPrice) / holding.buyPrice) * 100;
      const newsData = await fetch(`${backendUrl}/api/news?code=${holding.code}&name=${encodeURIComponent(holding.name)}`).then(r => r.json()).catch(() => ({}));
      const payload = {
        code: holding.code,
        name: holding.name,
        buyPrice: holding.buyPrice,
        currentPrice: cur,
        profitPct: pct,
        analysis,
        market: marketData?.market || [],
        stockNews: newsData.stockNews || [],
        macroNews: newsData.macroNews || [],
        disclosures: newsData.disclosures || [],
      };
      const r = await fetch(`${backendUrl}/api/ai-guide`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (r.ok) {
        const d = await r.json();
        if (!d.error) setAiGuide(d);
      }
    } catch {}
    setAiLoading(false);
  };

  const updateCurrentPrice = (price) => {
    onUpdate({ currentPrice: parseFloat(price) || 0 });
  };

  return (
    <div className="space-y-4 safe-bottom">
      <div className="flex items-center justify-between">
        <button onClick={onBack} className="text-zinc-400 text-sm flex items-center gap-1">← 뒤로</button>
        <button onClick={onDelete} className="text-red-400 text-sm flex items-center gap-1">
          <Ic.Trash size={16}/> 삭제
        </button>
      </div>

      {/* 종목 헤더 */}
      <div className="bg-gradient-to-br from-zinc-900 to-zinc-950 border border-zinc-800 rounded-2xl p-5">
        <div className="flex items-center gap-2 mb-1 flex-wrap">
          <div className="text-2xl font-bold text-white">{holding.name}</div>
          <div className="text-xs text-zinc-500 font-mono">{holding.code}</div>
          {corp && (
            <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${corp.market === 'KOSPI' ? 'bg-blue-900/40 text-blue-300' : 'bg-purple-900/40 text-purple-300'}`}>
              {corp.market}
            </span>
          )}
        </div>
        <div className="text-xs text-zinc-500">
          {holding.qty}주 × ₩{fmt(holding.buyPrice)} · 매수일 {holding.buyDate} · 보유 {daysHeld}일
        </div>
      </div>

      {/* 평가 손익 */}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
        <div className="text-xs text-zinc-500 uppercase tracking-wider mb-2">평가 손익</div>
        <div className={`text-3xl font-bold font-mono mb-1 ${profitPct >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
          {fmtPct(profitPct)}
        </div>
        <div className={`text-sm font-mono ${totalProfit >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
          {totalProfit >= 0 ? '+' : '-'}₩{fmt(Math.abs(totalProfit))}
        </div>
        <div className="grid grid-cols-2 gap-2 mt-4">
          <div className="bg-zinc-950 rounded-lg p-2.5">
            <div className="text-xs text-zinc-500">매수가 <span className="text-zinc-600">(탭으로 수정)</span></div>
            <input type="text" inputMode="decimal"
              key={holding.buyPrice}
              defaultValue={fmt(holding.buyPrice)}
              onFocus={e => { e.target.value = holding.buyPrice; }}
              onBlur={e => { const v = parseFloat(e.target.value.replace(/,/g, '')); if (v > 0) { onUpdate({ buyPrice: v }); e.target.value = fmt(v); } else { e.target.value = fmt(holding.buyPrice); } }}
              className="w-full bg-transparent text-white font-mono focus:outline-none"/>
          </div>
          <div className="bg-zinc-950 rounded-lg p-2.5">
            <div className="text-xs text-zinc-500">현재가 {liveAnalysis && !analysisFromCache ? <span className="text-emerald-400">실시간</span> : analysisFromCache ? <span className="text-amber-400">캐시</span> : ''}</div>
            <input type="text" inputMode="decimal"
              key={currentDisplay}
              defaultValue={fmt(currentDisplay)}
              onFocus={e => { e.target.value = currentDisplay; }}
              onBlur={e => { const v = parseFloat(e.target.value.replace(/,/g, '')); if (v > 0) { updateCurrentPrice(v); e.target.value = fmt(v); } else { e.target.value = fmt(currentDisplay); } }}
              className="w-full bg-transparent text-white font-mono focus:outline-none"/>
          </div>
        </div>
      </div>

      {/* 리버모어 + 피터린치 종합 분석 */}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b border-zinc-800">
          <div className="flex items-center gap-2">
            <Ic.BarChart size={16} className="text-red-400"/>
            <span className="text-white font-semibold text-sm">리버모어 · 린치 종합 분석</span>
          </div>
          <div className="flex items-center gap-2">
            {analysisFromCache && <span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-900/40 text-amber-400">캐시됨</span>}
            <button onClick={() => loadAnalysis(true)} disabled={analysisLoading}
              className="text-xs text-zinc-400 hover:text-white disabled:opacity-50 transition">
              {analysisLoading ? '분석 중...' : '🔄 새로고침'}
            </button>
          </div>
        </div>

        {analysisError ? (
          <div className="p-4 space-y-2">
            <div className="text-xs text-red-400">{analysisError}</div>
            <div className="text-[10px] text-zinc-600 font-mono break-all">
              {backendUrl ? `${backendUrl}/api/analyze?code=${holding.code.replace(/^A/,'')}` : '설정 탭에서 백엔드 URL을 입력하세요'}
            </div>
            <button onClick={() => loadAnalysis(true)} className="text-xs text-zinc-400 hover:text-white underline">다시 시도</button>
          </div>
        ) : analysisLoading ? (
          <div className="p-6 text-center text-zinc-500 text-sm">
            <div className="animate-pulse">리버모어·린치 분석 중...</div>
          </div>
        ) : liveAnalysis ? (() => {
          const { lScore = 0, lGrade = '', lReasons = [], pScore = 0, pGrade = '', pReasons = [], combinedSignal: csig, rsi, ma5, ma20, ma60, close, candles, ma5arr, ma20arr, ma60arr, bb, support, resistance, keyLevels, adx, mfi, psar, elder, dynStop, fScore } = liveAnalysis;
          const isBuy = csig?.signal === 'BUY';
          const isSell = csig?.signal === 'SELL';
          const sigStyle = isBuy
            ? { bg: 'bg-red-950/60 border-red-800/60', text: 'text-red-400', label: '🚀 매수 신호', sub: '매수 또는 추가 매수 타이밍' }
            : isSell
            ? { bg: 'bg-blue-950/60 border-blue-800/60', text: 'text-blue-400', label: '🔻 매도 신호', sub: '익절 또는 손절 검토 타이밍' }
            : { bg: 'bg-zinc-950/60 border-zinc-700/60', text: 'text-zinc-400', label: '⏸ 관망', sub: '추가 매수 보류 — 신호 대기' };

          const maAligned = ma5 > ma20 && ma20 > ma60;
          const maReverse = ma5 < ma20 && ma20 < ma60;

          const buyReasons = lReasons.filter(r => r.pos === true).slice(0, 3);
          const buyWarnings = lReasons.filter(r => r.pos === false).slice(0, 2);
          const lynchPos = pReasons.filter(r => r.pos === true).slice(0, 3);
          const lynchNeg = pReasons.filter(r => r.pos === false).slice(0, 2);

          return (
            <div className="p-4 space-y-4">
              {/* 캔들 차트 */}
              {candles && candles.length > 0 && (
                <div>
                  <div className="text-xs text-zinc-500 font-semibold mb-2">최근 {candles.length}일 차트</div>
                  <CandleChart
                    data={candles.map(c => ({ ...c, h: c.h ?? c.high, l: c.l ?? c.low, o: c.o ?? c.open, c: c.c ?? c.close }))}
                    ma5={ma5arr || []} ma20={ma20arr || []} ma60={ma60arr || []}
                    bb={bb} support={support} resistance={resistance} keyLevels={keyLevels}
                  />
                </div>
              )}

              {/* 한국 시장 특수 플래그 */}
              {liveAnalysis.krFlags && liveAnalysis.krFlags.length > 0 && (
                <div className="flex flex-wrap gap-1.5">
                  {liveAnalysis.krFlags.map((f, i) => (
                    <span key={i} className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${

              {/* 종합 판단 배너 */}
              <div className={`${sigStyle.bg} border rounded-xl p-3`}>

              {(maAligned || maReverse) && (

                  {maAligned ? '✅ 5일 > 20일 > 60일 정배열 — 상승 추세 유지 중' : '⚠️ 5일 < 20일 < 60일 역배열 — 하락 추세'}

              {/* 리버모어 근거 */}
              <div>
                <div className="text-xs text-zinc-500 font-semibold mb-1.5">리버모어 판단 근거</div>
                <div className="space-y-1">

                  ))}

              {/* 백테스트 결과 */}
              {liveAnalysis.backtest && liveAnalysis.backtest.count > 0 && (

                    {[['5일 후', liveAnalysis.backtest.days5], ['10일 후', liveAnalysis.backtest.days10], ['20일 후', liveAnalysis.backtest.days20]].map(([label, s]) => s && (
                      <div key={label} className="bg-zinc-900 rounded-lg p-2">

              {/* Piotroski F-Score */}

                  <div className="space-y-1 text-xs">

                      <div className="text-zinc-400">• 손절선 (ATR {dynStop.atrPct}%): 기본 ₩{fmt(dynStop.normal.price)} ({dynStop.normal.pct}%) / 여유 ₩{fmt(dynStop.wide.price)} ({dynStop.wide.pct}%)</div>

                      <div className="text-zinc-400">• 손절선: ₩{fmt(stopLossPrice)} (-3%) / ₩{fmt(absStopPrice)} (-7%)</div>

                    <div className="text-zinc-400">• 현재 수익률 {fmtPct(profitPct)} — {profitPct >= 5 ? '1차 익절 구간 도달' : profitPct >= 0 ? '소폭 상승, 추세 확인 후 결정' : '손실 중 — 손절선 확인'}</div>
                    <div className="text-zinc-400">• 절대 손절: ₩{fmt(absStopPrice)} (-7% from 현재가)</div>
                  </div>
                )}
                {!isBuy && !isSell && (
                  <div className="space-y-1 text-xs">
                    <div className="text-zinc-300">• 관망 — 추가 매수 보류, 기존 포지션 유지</div>
                    <div className="text-zinc-400">• 매수 신호 기준: {csig?.buyPoints || 0}/{csig?.totalBuyCriteria || 12} (4개 이상 시 매수)</div>
                    {dynStop ? (
                      <div className="text-zinc-400">• 손절선 (ATR {dynStop.atrPct}%): 기본 ₩{fmt(dynStop.normal.price)} ({dynStop.normal.pct}%) 이탈 시 즉시 대응</div>
                    ) : (
                      <div className="text-zinc-400">• 손절선: ₩{fmt(stopLossPrice)} (-3%) 이탈 시 즉시 대응</div>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        })() : (
          <div className="p-4 text-center text-zinc-600 text-xs">
            분석 데이터 없음 — 🔄 버튼으로 조회하세요
          </div>
        )}
      </div>

      {/* AI 매매 가이드 */}
      {(() => {
        const verdictStyle = {
          '보유':     { bg: 'bg-emerald-950/50 border-emerald-700/50', text: 'text-emerald-300' },
          '익절검토': { bg: 'bg-amber-950/50 border-amber-700/50',   text: 'text-amber-300' },
          '손절검토': { bg: 'bg-red-950/50 border-red-700/50',       text: 'text-red-300' },
          '관망':     { bg: 'bg-zinc-800/60 border-zinc-700',        text: 'text-zinc-300' },
        };
        const vs = verdictStyle[aiGuide?.verdict] || verdictStyle['관망'];
        return (
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 space-y-4">
            <div className="flex items-center justify-between">
              <div className="text-white font-semibold flex items-center gap-2">
                <Ic.Target size={16} className="text-emerald-400"/>
                AI 매매 가이드
                <span className="text-[10px] text-zinc-500 font-normal">Gemini</span>
              </div>
              <button onClick={() => liveAnalysis && loadAiGuide(liveAnalysis)}
                disabled={aiLoading || !backendUrl}
                className="text-xs text-zinc-400 hover:text-white disabled:opacity-40">
                {aiLoading ? '분석 중...' : '🔄'}
              </button>
            </div>

            {!backendUrl ? (
              <div className="text-xs text-zinc-500">백엔드 URL 설정 필요</div>
            ) : aiLoading && !aiGuide ? (
              <div className="text-xs text-zinc-400 animate-pulse">Gemini가 분석 중입니다...</div>
            ) : aiGuide ? (
              <>
                <div className={`${vs.bg} border rounded-xl px-4 py-3`}>
                  <div className={`font-bold text-sm ${vs.text}`}>{aiGuide.verdict}</div>
                  <div className="text-xs text-zinc-300 mt-1">{aiGuide.summary}</div>
                </div>
                <div className="text-xs text-zinc-300 leading-relaxed">{aiGuide.reasoning}</div>
                {aiGuide.holdReasons?.length > 0 && (
                  <div className="space-y-1">
                    {aiGuide.holdReasons.map((r, i) => (
                      <div key={i} className="flex items-start gap-2 text-xs text-emerald-400"><span>🟢</span><span>{r}</span></div>
                    ))}
                  </div>
                )}
                {aiGuide.sellTriggers?.length > 0 && (
                  <div className="space-y-1">
                    <div className="text-[10px] text-zinc-500 font-semibold">매도 트리거 (이 때 팔아라)</div>
                    {aiGuide.sellTriggers.map((r, i) => (
                      <div key={i} className="flex items-start gap-2 text-xs text-amber-400"><span>⚠️</span><span>{r}</span></div>
                    ))}
                  </div>
                )}
                {aiGuide.riskFactors?.length > 0 && (
                  <div className="space-y-1">
                    <div className="text-[10px] text-zinc-500 font-semibold">리스크</div>
                    {aiGuide.riskFactors.map((r, i) => (
                      <div key={i} className="flex items-start gap-2 text-xs text-red-400"><span>🔴</span><span>{r}</span></div>
                    ))}
                  </div>
                )}
                {aiGuide.stopLoss && (
                  <div className="bg-red-950/30 border border-red-900/30 rounded-lg px-3 py-2 text-xs text-red-300">
                    🛑 손절 기준: {aiGuide.stopLoss}
                  </div>
                )}
                <div className="text-[10px] text-zinc-600 border-t border-zinc-800 pt-2">
                  현재가 기준 -3% ₩{fmt(stopLossPrice)} / -7% ₩{fmt(absStopPrice)} · 매수가 ₩{fmt(holding.buyPrice)} · 수익 {profitPct >= 0 ? '+' : ''}{profitPct.toFixed(1)}%
                </div>
              </>
            ) : (
              <div className="text-xs text-zinc-500">분석 새로고침 후 AI 가이드가 생성됩니다</div>
            )}
          </div>
        );
      })()}

      {/* 기술적 신호 보조 (분석 없을 때 폴백) */}
      {!aiGuide && (() => {
        const rsi      = liveAnalysis?.rsi;
        const macd     = liveAnalysis?.macd;
        const bb       = liveAnalysis?.bb;
        const lScore   = liveAnalysis?.lScore ?? 0;
        const ma5v     = liveAnalysis?.ma5;
        const ma20v    = liveAnalysis?.ma20;
        const ma60v    = liveAnalysis?.ma60;
        const hipr12m  = liveAnalysis?.hipr12m;
        const hasData  = !!liveAnalysis;

        const isAligned   = ma5v && ma20v && ma60v && ma5v > ma20v && ma20v > ma60v;
        const isOverbought = rsi != null && rsi > 75;
        const isHealthy    = rsi != null && rsi >= 50 && rsi <= 70;
        const isOversold   = rsi != null && rsi < 35;
        const isMacdGold   = macd?.lastCross === 'golden';
        const isMacdDead   = macd?.lastCross === 'dead';
        const isBBHigh     = bb?.percentB != null && bb.percentB > 80;
        const near52High   = hipr12m && currentDisplay / hipr12m > 0.95;
        const isStrong     = lScore >= 65;
        const isWeak       = lScore < 35;

        // 익절 신호 (팔아야 할 이유)
        const sellSignals = [];
        if (isOverbought)  sellSignals.push({ icon: '🔴', text: `RSI ${rsi?.toFixed(0)} — 과열. 분할 익절 고려` });
        if (isMacdDead)    sellSignals.push({ icon: '🔴', text: 'MACD 데드크로스 — 추세 전환 신호' });
        if (isBBHigh)      sellSignals.push({ icon: '🟡', text: `BB 상단 근접 (${bb?.percentB?.toFixed(0)}%) — 단기 조정 가능` });
        if (!isAligned && hasData) sellSignals.push({ icon: '🟡', text: '이동평균 역배열 — 추세 약화 중' });
        if (isWeak && hasData)     sellSignals.push({ icon: '🟡', text: `리버모어 ${lScore}점 — 모멘텀 부족` });

        // 보유 신호 (들고 갈 이유)
        const holdSignals = [];
        if (isStrong)    holdSignals.push({ icon: '🟢', text: `리버모어 ${lScore}점 — 추세 강함, 보유 유리` });
        if (isMacdGold)  holdSignals.push({ icon: '🟢', text: 'MACD 골든크로스 — 상승 지속 가능' });
        if (isAligned)   holdSignals.push({ icon: '🟢', text: '정배열 유지 — 추세 살아있음' });
        if (near52High)  holdSignals.push({ icon: '🟢', text: '52주 신고가 근접 — 돌파 시 추가 상승 여력' });
        if (isHealthy)   holdSignals.push({ icon: '🟢', text: `RSI ${rsi?.toFixed(0)} — 건강한 상승 구간` });

        // 종합 판단
        const sellScore = sellSignals.length;
        const holdScore = holdSignals.length;
        let verdict, verdictBg, verdictText, verdictSub;
        if (!hasData) {
          verdict = '분석 데이터 없음'; verdictBg = 'bg-zinc-800/60 border-zinc-700'; verdictText = 'text-zinc-400';
          verdictSub = '분석 새로고침 후 확인하세요';
        } else if (sellScore >= 2 || (isOverbought && isMacdDead)) {
          verdict = '익절 검토'; verdictBg = 'bg-amber-950/50 border-amber-700/50'; verdictText = 'text-amber-300';
          verdictSub = '복수의 매도 신호 — 분할 매도 권장';
        } else if (holdScore >= 2 && sellScore === 0) {
          verdict = '보유 우선'; verdictBg = 'bg-emerald-950/50 border-emerald-700/50'; verdictText = 'text-emerald-300';
          verdictSub = '추세 양호 — 손절선 위에서 보유 지속';
        } else if (isWeak || isMacdDead) {
          verdict = '손절 점검'; verdictBg = 'bg-red-950/50 border-red-700/50'; verdictText = 'text-red-300';

function AddJournalForm({ onAdd, onCancel }) {
  const [code, setCode] = useState('');
  const [name, setName] = useState('');
  const [buyPrice, setBuyPrice] = useState('');
  const [buyDate, setBuyDate] = useState(todayISO());
  const [qty, setQty] = useState('');
  const [sellPrice, setSellPrice] = useState('');
  const [sellDate, setSellDate] = useState('');
  const [note, setNote] = useState('');

  const submit = () => {
    if (!code || !name || !buyPrice || !qty || !buyDate) {
      alert('종목코드, 종목명, 매수가, 수량, 매수일은 필수입니다');
      return;
    }
    const bp = parseFloat(buyPrice), sp = parseFloat(sellPrice), q = parseInt(qty);
    const profitPct = sp && bp ? ((sp - bp) / bp) * 100 : null;
    onAdd({
      id: Date.now(), code, name, buyPrice: bp, buyDate, qty: q,
      sellPrice: sp || null, sellDate: sellDate || null,
      note, profitPct, status: sp ? 'closed' : 'open',
    });
  };

  return (
    <div className="space-y-3 safe-bottom">
      <div className="flex items-center justify-between">
        <div className="text-xl font-bold text-white">매매 기록 추가</div>
        <button onClick={onCancel} className="text-zinc-400"><Ic.X size={24}/></button>
      </div>
      <div className="bg-zinc-900 border border-amber-900/40 rounded-2xl p-4 space-y-3">
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">종목 검색</label>
          <StockSearch value={code} onChange={(v) => setCode(v.replace(/\D/g,'').slice(0,6))} onSelect={(s) => { setCode(s.code); setName(s.name); }}/>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">종목명</label>
          <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="현대차"
            className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white focus:border-amber-700 outline-none"/>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">매수가</label>
            <input type="number" value={buyPrice} onChange={e => setBuyPrice(e.target.value)} placeholder="50000"
              className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white font-mono focus:border-amber-700 outline-none"/>
          </div>
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">수량</label>
            <input type="number" value={qty} onChange={e => setQty(e.target.value)} placeholder="10"
              className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white font-mono focus:border-amber-700 outline-none"/>
          </div>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">매수일</label>
          <input type="date" value={buyDate} onChange={e => setBuyDate(e.target.value)}
            className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white focus:border-amber-700 outline-none"/>
        </div>
        <div className="border-t border-zinc-800 pt-3">
          <div className="text-xs text-zinc-500 mb-2">매도 정보 (선택 — 비우면 보유중으로 저장)</div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="text-xs text-zinc-500 mb-1 block">매도가</label>
              <input type="number" value={sellPrice} onChange={e => setSellPrice(e.target.value)} placeholder="60000"
                className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white font-mono focus:border-amber-700 outline-none"/>
            </div>
            <div>
              <label className="text-xs text-zinc-500 mb-1 block">매도일</label>
              <input type="date" value={sellDate} onChange={e => setSellDate(e.target.value)}
                className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white focus:border-amber-700 outline-none"/>
            </div>
          </div>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">메모</label>
          <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="매매 이유, 느낀점..."
            className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white focus:border-amber-700 outline-none"/>
        </div>
        <button onClick={submit} className="w-full bg-amber-600 hover:bg-amber-700 text-white rounded-lg py-3 font-semibold transition">
          기록 추가
        </button>
      </div>
    </div>
  );

function JournalTab({ journal, setJournal, holdings, setHoldings }) {
  const stats = calcJournalStats(journal);
  const patterns = analyzePatterns(journal);
  const closed = journal.filter(t => t.sellPrice).sort((a, b) => new Date(b.sellDate) - new Date(a.sellDate));
  const openEntries = journal.filter(t => !t.sellPrice && t.status === 'open');

  const [editingId, setEditingId] = useState(null);
  const [noteText, setNoteText] = useState('');
  const [showAdd, setShowAdd] = useState(false);

  const chartData = useMemo(() => {
    if (closed.length === 0) return [];
    const sorted = [...closed].sort((a, b) => new Date(a.sellDate) - new Date(b.sellDate));
    let cum = 0;
    return sorted.map(t => { cum += (t.sellPrice - t.buyPrice) * t.qty; return cum; });
  }, [closed]);

  const deleteEntry = (id) => {
    if (confirm('이 기록을 삭제하시겠습니까?')) {
      const entry = journal.find(t => t.id === id);
      setJournal(journal.filter(t => t.id !== id));
      if (entry && !entry.sellPrice) {
        setHoldings(prev => prev.filter(h => h.journalId !== id && h.id !== id));
      }
    }
  };

  const saveNote = (id) => {
    setJournal(journal.map(j => j.id === id ? { ...j, note: noteText } : j));
    setEditingId(null);
  };

  const handleRebuy = (t) => {
    const id = Date.now();
    setHoldings([...holdings, {
      id, journalId: id, code: t.code, name: t.name,
      buyPrice: t.sellPrice, buyDate: todayISO(), qty: t.qty,
      currentPrice: t.sellPrice, portfolio: t.portfolio || 'long',
    }]);
    setJournal([...journal, {
      id, code: t.code, name: t.name, buyPrice: t.sellPrice, buyDate: todayISO(), qty: t.qty,
      portfolio: t.portfolio || 'long', entryRsi: null,
      status: 'open', sellPrice: null, sellDate: null, note: '', profitPct: null,
    }]);
  };

  if (showAdd) return <AddJournalForm onAdd={(e) => {
    setJournal(prev => [...prev, e]);
    if (!e.sellPrice) {
      setHoldings(prev => [...prev, {
        id: e.id, journalId: e.id, code: e.code, name: e.name,
        buyPrice: e.buyPrice, buyDate: e.buyDate, qty: e.qty,
        currentPrice: e.buyPrice, portfolio: e.portfolio || 'long',
      }]);
    }
    setShowAdd(false);
  }} onCancel={() => setShowAdd(false)}/>;

  return (
    <div className="space-y-4 safe-bottom">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-2xl font-bold text-white">매매 일지</div>
          <div className="text-xs text-zinc-500 mt-0.5">{stats.total}건 기록</div>
        </div>
        <button onClick={() => setShowAdd(true)}
          className="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-xl">
          + 기록 추가
        </button>
      </div>

      {openEntries.length > 0 && (
        <div className="space-y-2">
          <div className="text-xs text-zinc-500 uppercase tracking-wider">현재 보유 (매수 기록)</div>
          {openEntries.map(t => (
            <div key={t.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 border-l-2 border-l-amber-700">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="text-white font-semibold text-sm">{t.name}</div>
                  <div className="text-xs text-zinc-500 font-mono">{t.code}</div>
                  <span className="text-[10px] bg-amber-900/50 text-amber-300 px-1.5 py-0.5 rounded">보유중</span>
                </div>
                <button onClick={() => deleteEntry(t.id)} className="text-zinc-600 hover:text-red-400">
                  <Ic.Trash size={14}/>
                </button>
              </div>
              <div className="text-xs text-zinc-500 mt-1">
                ₩{fmt(t.buyPrice)} × {t.qty}주 · {t.buyDate}
              </div>
            </div>
          ))}
        </div>
      )}

      {stats.total === 0 && openEntries.length === 0 ? (
        <div className="bg-zinc-900 border border-zinc-800 border-dashed rounded-2xl p-10 text-center">
          <Ic.Book size={48} className="text-zinc-700 mx-auto mb-3"/>
          <div className="text-zinc-400 text-sm mb-1">매매 기록이 없습니다</div>
          <div className="text-zinc-600 text-xs">포트폴리오에서 매수·매도 시 자동 기록됩니다</div>
        </div>
      ) : stats.total > 0 && (

                    ₩{fmt(t.buyPrice)} → ₩{fmt(t.sellPrice)} ({t.qty}주)

                    <div className="mt-2 flex gap-2">
                      <input type="text" value={noteText} onChange={e => setNoteText(e.target.value)}

                      className="mt-1.5 text-xs text-zinc-500 hover:text-zinc-300 cursor-pointer min-h-[18px]">
                      {t.note ? `"${t.note}"` : <span className="text-zinc-700 italic">메모 없음 — 클릭하여 추가</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
