// ─────────────────────────────────────
// 1. 캔들차트 컴포넌트 (SVG)
// ─────────────────────────────────────
function CandleChart({ data, width = 340, height = 220, ma5 = [], ma20 = [], ma60 = [], bb = null, support = null, resistance = null, keyLevels = null }) {
  if (!data || data.length === 0) {
    return <div className="h-48 flex items-center justify-center text-zinc-600 text-sm bg-zinc-950 rounded-lg">데이터 입력 필요</div>;
  }
  const n = data.length;
  const volH = 36; // 거래량 패널 높이
  const candleH = height - volH - 4;
  const padding = { top: 18, right: 8, bottom: 14, left: 46 };
  const chartW = width - padding.left - padding.right;
  const chartH = candleH - padding.top - padding.bottom;
  const stepX = chartW / n;
  const candleW = Math.max(2, stepX * 0.65);

  const allPrices = data.flatMap(d => [d.h, d.l]).concat(ma5, ma20, ma60).filter(v => v && !isNaN(v));
  if (bb) { allPrices.push(bb.upper, bb.lower); }
  const minP = Math.min(...allPrices), maxP = Math.max(...allPrices);
  const rangeP = maxP - minP || 1;
  const yP = v => padding.top + chartH - ((v - minP) / rangeP) * chartH;
  const xC = i => padding.left + i * stepX + stepX / 2;

  const maPath = (arr) => {
    if (!arr || arr.length < 2) return '';
    return arr.map((v, i) => (!v || isNaN(v)) ? '' : `${i === 0 ? 'M' : 'L'} ${xC(i)} ${yP(v)}`).filter(Boolean).join(' ');
  };

  const maxVol = Math.max(...data.map(d => d.v || 0), 1);
  const volY0 = height - 2;
  const volTop = height - volH + 2;

  // 볼린저밴드 영역 폴리곤 (상단선 → 하단선 역순)
  const bbAreaPts = bb ? (() => {
    const upper = data.map((_, i) => `${xC(i)},${yP(bb.upper)}`).join(' ');
    const lower = data.map((_, i) => `${xC(n - 1 - i)},${yP(bb.lower)}`).join(' ');
    return `${upper} ${lower}`;
  })() : '';

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} className="bg-zinc-950 rounded-lg">
      <defs>
        <clipPath id="candleClip"><rect x={padding.left} y={padding.top} width={chartW} height={chartH}/></clipPath>
      </defs>

      {/* 그리드 */}
      {[0, 0.25, 0.5, 0.75, 1].map(p => {
        const y = padding.top + chartH * p;
        const v = maxP - p * rangeP;
        return (
          <g key={p}>
            <line x1={padding.left} x2={width - padding.right} y1={y} y2={y} stroke="#27272a" strokeDasharray="2 4"/>
            <text x={padding.left - 4} y={y + 3} fill="#52525b" fontSize="8" fontFamily="monospace" textAnchor="end">{(v/1000).toFixed(0)}K</text>
          </g>
        );
      })}

      {/* 볼린저밴드 영역 */}
      {bb && <polygon points={bbAreaPts} fill="#6366f1" fillOpacity="0.06" clipPath="url(#candleClip)"/>}
      {bb && <line x1={padding.left} x2={width-padding.right} y1={yP(bb.upper)} y2={yP(bb.upper)} stroke="#6366f1" strokeWidth="1" strokeDasharray="3 2" opacity="0.5"/>}
      {bb && <line x1={padding.left} x2={width-padding.right} y1={yP(bb.middle)} y2={yP(bb.middle)} stroke="#6366f1" strokeWidth="0.5" strokeDasharray="2 4" opacity="0.3"/>}
      {bb && <line x1={padding.left} x2={width-padding.right} y1={yP(bb.lower)} y2={yP(bb.lower)} stroke="#6366f1" strokeWidth="1" strokeDasharray="3 2" opacity="0.5"/>}

      {/* 지지/저항선 */}
      {resistance && resistance > minP && resistance < maxP && (
        <line x1={padding.left} x2={width-padding.right} y1={yP(resistance)} y2={yP(resistance)} stroke="#f59e0b" strokeWidth="1" strokeDasharray="4 2" opacity="0.7"/>
      )}
      {support && support > minP && support < maxP && (
        <line x1={padding.left} x2={width-padding.right} y1={yP(support)} y2={yP(support)} stroke="#22d3ee" strokeWidth="1" strokeDasharray="4 2" opacity="0.7"/>
      )}
      {/* 2차 지지/저항선 (keyLevels) */}
      {keyLevels?.resistances?.slice(1).map((r, i) => r.price > minP && r.price < maxP && (
        <line key={`kr${i}`} x1={padding.left} x2={width-padding.right} y1={yP(r.price)} y2={yP(r.price)} stroke="#f59e0b" strokeWidth="0.7" strokeDasharray="2 5" opacity="0.35"/>
      ))}
      {keyLevels?.supports?.slice(1).map((s, i) => s.price > minP && s.price < maxP && (
        <line key={`ks${i}`} x1={padding.left} x2={width-padding.right} y1={yP(s.price)} y2={yP(s.price)} stroke="#22d3ee" strokeWidth="0.7" strokeDasharray="2 5" opacity="0.35"/>
      ))}

      {/* 캔들 */}
      <g clipPath="url(#candleClip)">
        {data.map((d, i) => {
          const x = xC(i);
          const isUp = (d.c ?? d.close) >= (d.o ?? d.open);
          const color = isUp ? '#ef4444' : '#3b82f6';
          const hi = d.h ?? d.high, lo = d.l ?? d.low, op = d.o ?? d.open, cl = d.c ?? d.close;
          return (
            <g key={i}>
              <line x1={x} x2={x} y1={yP(hi)} y2={yP(lo)} stroke={color} strokeWidth="1"/>
              <rect x={x - candleW/2} y={yP(Math.max(op, cl))}
                width={candleW} height={Math.max(1, Math.abs(yP(op) - yP(cl)))} fill={color}/>
            </g>
          );
        })}
      </g>

      {/* 이동평균선 */}
      {ma5.length > 0 && <path d={maPath(ma5)} fill="none" stroke="#fbbf24" strokeWidth="1.5" clipPath="url(#candleClip)"/>}
      {ma20.length > 0 && <path d={maPath(ma20)} fill="none" stroke="#a78bfa" strokeWidth="1.5" clipPath="url(#candleClip)"/>}
      {ma60.length > 0 && <path d={maPath(ma60)} fill="none" stroke="#22d3ee" strokeWidth="1.5" clipPath="url(#candleClip)"/>}

      {/* 범례 */}
      <g transform={`translate(${padding.left}, ${padding.top - 2})`}>
        <text x="0"  y="0" fill="#fbbf24" fontSize="8" fontFamily="monospace">5</text>
        <text x="10" y="0" fill="#a78bfa" fontSize="8" fontFamily="monospace">20</text>
        <text x="22" y="0" fill="#22d3ee" fontSize="8" fontFamily="monospace">60</text>
        {bb && <text x="36" y="0" fill="#6366f1" fontSize="8" fontFamily="monospace">BB</text>}
        {resistance && <text x="52" y="0" fill="#f59e0b" fontSize="8" fontFamily="monospace">저항</text>}
        {support && <text x="72" y="0" fill="#22d3ee" fontSize="8" fontFamily="monospace">지지</text>}
      </g>

      {/* 구분선 */}
      <line x1={padding.left} x2={width-padding.right} y1={candleH} y2={candleH} stroke="#27272a" strokeWidth="0.5"/>

      {/* 거래량 바 */}
      {data.map((d, i) => {
        const x = xC(i);
        const isUp = (d.c ?? d.close) >= (d.o ?? d.open);
        const vol = d.v || 0;
        const barH = Math.max(1, ((vol / maxVol) * (volH - 6)));
        return (
          <rect key={i} x={x - candleW/2} y={volY0 - barH}
            width={candleW} height={barH}
            fill={isUp ? '#ef444466' : '#3b82f666'}/>
        );
      })}
      <text x={padding.left - 4} y={volTop + 8} fill="#52525b" fontSize="7" fontFamily="monospace" textAnchor="end">Vol</text>
    </svg>
  );
}

// ── MACD 패널 ─────────────────────────────────────────────────
function MACDPanel({ macd, width = 340, height = 80 }) {
  if (!macd || !macd.histArr) return null;
  const hist = macd.histArr.filter(v => v != null);
  if (hist.length < 2) return null;
  const n = macd.histArr.length;
  const padding = { top: 8, right: 8, bottom: 12, left: 46 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;
  const stepX = chartW / n;
  const barW = Math.max(1.5, stepX * 0.7);

  const absMax = Math.max(...hist.map(Math.abs), 1);
  const yZero = padding.top + chartH / 2;
  const yScale = v => yZero - (v / absMax) * (chartH / 2);

  const macdPath = macd.macdArr.map((v, i) => {
    if (v == null) return '';
    return `${i === 0 ? 'M' : 'L'} ${padding.left + i * stepX + stepX/2} ${yScale(v)}`;
  }).filter(Boolean).join(' ');
  const sigPath = macd.signalArr.map((v, i) => {
    if (v == null) return '';
    return `${i === 0 ? 'M' : 'L'} ${padding.left + i * stepX + stepX/2} ${yScale(v)}`;
  }).filter(Boolean).join(' ');

  const crossColor = macd.lastCross === 'golden' ? '#10b981' : macd.lastCross === 'dead' ? '#ef4444' : '#71717a';

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} className="bg-zinc-950 rounded-lg">
      <line x1={padding.left} x2={width-padding.right} y1={yZero} y2={yZero} stroke="#3f3f46" strokeWidth="0.5"/>
      <text x={padding.left - 4} y={padding.top + 6} fill="#52525b" fontSize="7" textAnchor="end">MACD</text>

      {macd.histArr.map((v, i) => {
        if (v == null) return null;
        const x = padding.left + i * stepX + stepX/2;
        const isPos = v >= 0;
        return (
          <rect key={i} x={x - barW/2} y={isPos ? yScale(v) : yZero}
            width={barW} height={Math.max(0.5, Math.abs(yScale(v) - yZero))}
            fill={isPos ? '#10b98166' : '#ef444466'}/>
        );
      })}
      {macdPath && <path d={macdPath} fill="none" stroke="#60a5fa" strokeWidth="1.2"/>}
      {sigPath && <path d={sigPath} fill="none" stroke="#f97316" strokeWidth="1"/>}

      <g transform={`translate(${padding.left}, ${height - 4})`}>
        <text x="0"  fill="#60a5fa" fontSize="7" fontFamily="monospace">MACD</text>
        <text x="28" fill="#f97316" fontSize="7" fontFamily="monospace">Signal</text>
        <text x="60" fill={crossColor} fontSize="7" fontFamily="monospace">
          {macd.lastCross === 'golden' ? '↑골든' : macd.lastCross === 'dead' ? '↓데드' : ''}
        </text>
      </g>
    </svg>
  );
}

// 네이버 금융 직접 조회 (CORS 허용 시 백엔드 없이 실시간 가격)
async function fetchNaverStock(code) {
  const endpoints = [
    `https://m.stock.naver.com/api/stock/${code}/basic`,
    `https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`,
  ];
  for (const url of endpoints) {
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (!r.ok) continue;
      const d = await r.json();
      // m.stock.naver.com 형식
      if (d.closePrice !== undefined) {
        return {
          price: parseInt((d.closePrice || '0').toString().replace(/,/g, '')),
          name: d.stockName || d.name || '',
          changeRate: parseFloat(d.fluctuationsRatio || 0),
          change: parseInt((d.compareToPreviousClosePrice || '0').toString().replace(/,/g, '')),
          market: d.stockExchangeType?.name || '',
          source: 'naver',
        };
      }
      // polling 형식
      if (d.datas?.[0]) {
        const s = d.datas[0];
        return {
          price: s.nv || s.cv || 0,
          name: s.nm || '',
          changeRate: s.cr || 0,
          change: s.cv || 0,
          market: '',
          source: 'naver',
        };
      }
    } catch {}
  }
  return null;
}

function ChartAnalysisPanel({ backendUrl, apiKey, watchlist = [], setWatchlist }) {
  const [code, setCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [naverData, setNaverData] = useState(null);
  const [news, setNews] = useState(null);
  const [newsLoading, setNewsLoading] = useState(false);
  const [fromCache, setFromCache] = useState(false);
  const [weeklyData, setWeeklyData] = useState(null);
  const [stockNotes, setStockNotesState] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.STOCK_NOTES) || '{}'); }
    catch { return {}; }
  });
  const setStockNotes = (updater) => {
    setStockNotesState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      localStorage.setItem(STORAGE_KEYS.STOCK_NOTES, JSON.stringify(next));
      return next;
    });
  };

  const fetchNews = async (trimCode, resolvedCorp = '', resolvedName = '') => {
    setNewsLoading(true);
    try {
      const dartParam = apiKey ? `&dartKey=${encodeURIComponent(apiKey)}` : '';
      const corpInfo = corpCodeMap[trimCode];
      const corp = resolvedCorp || corpInfo?.corp || '';
      const name = resolvedName || corpInfo?.name || '';
      const corpParam = corp ? `&corp=${corp}` : '';
      const nameParam = name ? `&name=${encodeURIComponent(name)}` : '';
      const r = await fetch(`${backendUrl}/api/news?code=${trimCode}${corpParam}${nameParam}${dartParam}`);
      if (r.ok) setNews(await r.json());
    } catch {}
    setNewsLoading(false);
  };

  const saveToCache = (code, data) => {
    try {
      const cache = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
      cache[code] = { data: { ...data, _cachedAt: Date.now() }, cachedAt: Date.now() };
      // 최대 30개 종목 캐시 유지
      const keys = Object.keys(cache);
      if (keys.length > 30) {
        const oldest = keys.sort((a, b) => cache[a].cachedAt - cache[b].cachedAt)[0];
        delete cache[oldest];
      }
      localStorage.setItem(STORAGE_KEYS.ANALYSIS_CACHE, JSON.stringify(cache));
    } catch {}
  };

  const loadFromCache = (code) => {
    try {
      const cache = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
      const entry = cache[code];
      if (entry && Date.now() - entry.cachedAt < 3600000) return entry.data;
    } catch {}
    return null;
  };

  const analyze = (forceRefresh = false) => {
    runAnalysis(code, forceRefresh);
  };

  const runAnalysis = async (targetCode, forceRefresh = false) => {
    const trimCode = (targetCode || '').trim().replace(/^A/, '');
    if (!trimCode) { setError('종목명을 입력하면 자동으로 검색됩니다'); return; }

    // 네이버 실시간 가격 병렬 조회 (백엔드 없어도 동작)
    setNaverData(null);
    fetchNaverStock(trimCode).then(nd => { if (nd) setNaverData(nd); });

    if (!backendUrl) { setError('설정 → 실시간 탭에서 백엔드 URL을 먼저 입력하세요.'); return; }

    // 캐시 확인 (1시간 TTL)
    if (!forceRefresh) {
      const cached = loadFromCache(trimCode);
      if (cached) {
        setResult(cached); setFromCache(true); setError('');
        fetchNews(trimCode, cached.corpCode || '', cached.name || '');
        return;
      }
    }

    setLoading(true); setError(''); setResult(null); setNews(null); setFromCache(false); setWeeklyData(null);
    try {
      const dartParam = apiKey ? `&dartKey=${encodeURIComponent(apiKey)}` : '';
      const corpInfo = corpCodeMap[trimCode];
      const corpParam = corpInfo?.corp ? `&corp=${corpInfo.corp}` : '';
      const sectorParam = corpInfo?.sector ? `&sector=${encodeURIComponent(corpInfo.sector)}` : '';
      const [r] = await Promise.all([
        fetch(`${backendUrl}/api/analysis?code=${trimCode}${corpParam}${sectorParam}${dartParam}`),
        fetch(`${backendUrl}/api/weekly?code=${trimCode}`)
          .then(wr => wr.ok ? wr.json() : null)
          .then(wd => { if (wd) setWeeklyData(wd); })
          .catch(() => {}),
      ]);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      setResult(d);
      saveToCache(trimCode, d);
      fetchNews(trimCode, d.corpCode || '', d.name || '');
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const Chip = ({ label, color }) => (
    <span className={`px-2 py-0.5 rounded text-xs font-semibold ${color}`}>{label}</span>
  );

  const Signal = ({ icon, title, body, color }) => (
    <div className={`border rounded-xl p-3 ${color}`}>
      <div className="flex items-center gap-2 mb-1">
        <span className="text-lg">{icon}</span>
        <span className="text-white font-semibold text-sm">{title}</span>
      </div>
      <div className="text-xs text-zinc-300 leading-relaxed">{body}</div>
    </div>
  );

  const renderAnalysis = () => {
    if (!result) return null;
    const { name: rawName, rsi, score, ma5, ma20, ma60,
            changeRate, high52w, low52w, dart, fundamentals: fund,
            lScore = 0, lGrade, lReasons = [],
            pScore = 0, pGrade, pReasons = [],
            macd, bb, atr, mdd, support, resistance, combinedSignal: csig,
            deviation,
            candlePatterns = [], ichimoku, stochastic, obv, fibonacci, rsiDivergence, williamsR } = result;
    const name = corpCodeMap[result.code]?.name || rawName;

    const price = result.currentPrice || result.close;
    const volRatio = result.volRatio ?? result.volumeRatio ?? 0;
    const maAligned = ma5 > ma20 && ma20 > ma60;
    const maReverse = ma5 < ma20 && ma20 < ma60;
    const range52 = (high52w || 0) - (low52w || 0);
    const pos52 = range52 > 0 ? Math.round(((price - (low52w||0)) / range52) * 100) : 50;

    // 복합 신호 스타일
    const sigStyle = csig?.signal === 'BUY'
      ? { bg: 'bg-red-950 border-red-700', text: 'text-red-400', label: '매수', icon: '🚀' }
      : csig?.signal === 'SELL'
      ? { bg: 'bg-blue-950 border-blue-700', text: 'text-blue-400', label: '매도', icon: '🔻' }
      : { bg: 'bg-zinc-800 border-zinc-700', text: 'text-zinc-300', label: '관망', icon: '⏸' };

    // ScoreBar 컴포넌트
    const ScoreBar = ({ label, score, grade, color }) => (
      <div>
        <div className="flex items-center justify-between text-xs mb-1">
          <span className="text-zinc-400">{label}</span>
          <span className={`font-bold ${color}`}>{grade} {score}점</span>
        </div>
        <div className="h-2 bg-zinc-800 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all ${score >= 70 ? 'bg-red-500' : score >= 50 ? 'bg-yellow-500' : 'bg-zinc-600'}`}
            style={{width: `${Math.max(3, Math.min(100, score))}%`}}/>
        </div>
      </div>
    );

    // 리버모어 시그널
    const livermoreSigs = [];

                  {fund.peg < 0.5 ? '매우 저평가 — 텐배거 후보 최우선 검토' :
                   fund.peg < 1.0 ? '저평가 성장주 — 매수 매력 높음' :

                : candlePatterns.map((p, idx) => (

                      color={p.signal === 'bullish' ? 'bg-emerald-900/30 border-emerald-700/50' : p.signal === 'bearish' ? 'bg-red-900/30 border-red-700/50' : 'bg-zinc-800 border-zinc-700'}

                  body={ichimoku.priceVsCloud === 'above' ? '주가가 구름대 위 → 지지선 역할. 구름두께가 클수록 지지력 강함.' : ichimoku.priceVsCloud === 'below' ? '주가가 구름대 아래 → 저항선 역할. 구름 돌파까지 진입 신중.' : '구름대 내부 횡보 — 명확한 방향 출현까지 대기.'}
                  color={ichimoku.priceVsCloud === 'above' ? 'bg-emerald-900/30 border-emerald-700/50' : ichimoku.priceVsCloud === 'below' ? 'bg-red-900/30 border-red-700/50' : 'bg-zinc-800 border-zinc-700'}

                    { l:'전환선(9일)', v: ichimoku.tenkan },

                    { l:`선행A (${ichimoku.cloudColor === 'bullish' ? '🟢' : '🔴'})`, v: ichimoku.spanA },

                  </div>

                      <span className="text-zinc-400">%K</span>
                      <span className={`font-bold font-mono ${stochastic.k < 20 ? 'text-blue-400' : stochastic.k > 80 ? 'text-red-400' : 'text-white'}`}>{stochastic.k?.toFixed(1)}</span>

                      <span className="text-zinc-400">%D</span>
                      <span className={`font-bold font-mono ${stochastic.d < 20 ? 'text-blue-400' : stochastic.d > 80 ? 'text-red-400' : 'text-white'}`}>{stochastic.d?.toFixed(1)}</span>

                      {stochastic.signal === 'oversold' ? '과매도 구간' : stochastic.signal === 'overbought' ? '과매수 구간' : stochastic.signal === 'bullish_cross' ? '%K 골든크로스' : stochastic.signal === 'bearish_cross' ? '%K 데드크로스' : '중립'}
                    </div>

                  <div className="bg-zinc-950 rounded-lg p-3 space-y-1.5">

                    <div className={`text-2xl font-black font-mono text-center ${williamsR.value > -20 ? 'text-red-400' : williamsR.value < -80 ? 'text-blue-400' : 'text-white'}`}>{williamsR.value?.toFixed(1)}</div>
                    <div className={`text-xs text-center py-0.5 rounded ${williamsR.signal === 'overbought' ? 'text-red-400 bg-red-900/30' : williamsR.signal === 'oversold' ? 'text-blue-400 bg-blue-900/30' : 'text-zinc-500'}`}>
                      {williamsR.signal === 'overbought' ? '과매수 (-20 이상)' : williamsR.signal === 'oversold' ? '과매도 (-80 이하)' : '중립 구간'}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* OBV */}
          {obv && (
            <div>
              <div className="text-xs text-zinc-400 font-semibold mb-1.5">OBV — 매집/분산 추세</div>
              <Signal
                icon={obv.trend === 'accumulating' ? '📥' : obv.trend === 'distributing' ? '📤' : '➖'}
                title={obv.trend === 'accumulating' ? '매집 중 — OBV 상승 추세' : obv.trend === 'distributing' ? '분산 중 — OBV 하락 추세' : 'OBV 중립'}
                body={obv.trend === 'accumulating' ? '거래량 기반 OBV가 최근 상승 중. 기관/세력의 매집 가능성. 주가 선행 상승 신호.' : obv.trend === 'distributing' ? 'OBV 하락 — 보유 물량 분산 가능성. 주가 하락 선행 신호로 주의.' : 'OBV 뚜렷한 추세 없음 — 관망.'}

          {/* 피보나치 되돌림 */}
          {fibonacci && (

  const stockList = Object.entries(corpCodeMap).slice(0, 8);

// 2. 백테스팅 모듈
// ─────────────────────────────────────
function BacktestPanel({ journal }) {
  const [strategy, setStrategy] = useState({
    minScore: 70,
    target1: 5, target2: 7,
    stop1: -3, absStop: -7,
    maxDays: 5,
  });

  const closed = journal.filter(t => t.sellPrice && t.sellDate);

  const result = useMemo(() => {
    if (closed.length === 0) return null;

    const trades = closed.map(t => {
      const days = daysBetween(t.buyDate, t.sellDate);
      const wouldBeStrategy = t.profitPct >= strategy.target2 ? 'target2'
        : t.profitPct >= strategy.target1 ? 'target1'
        : t.profitPct <= strategy.absStop ? 'absStop'
        : t.profitPct <= strategy.stop1 ? 'stop1'
        : days >= strategy.maxDays ? 'timeout'
        : 'hold';

      let strategyProfit = t.profitPct;
      if (wouldBeStrategy === 'target1') strategyProfit = strategy.target1;
      else if (wouldBeStrategy === 'target2') strategyProfit = strategy.target2;
      else if (wouldBeStrategy === 'stop1') strategyProfit = strategy.stop1;
      else if (wouldBeStrategy === 'absStop') strategyProfit = strategy.absStop;

      return { ...t, days, wouldBeStrategy, strategyProfit };
    });

    const wins = trades.filter(t => t.strategyProfit > 0);
    const losses = trades.filter(t => t.strategyProfit <= 0);
    const winRate = trades.length > 0 ? (wins.length / trades.length) * 100 : 0;
    const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.strategyProfit, 0) / wins.length : 0;
    const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + t.strategyProfit, 0) / losses.length : 0;
    const totalReturn = trades.reduce((s, t) => s + t.strategyProfit, 0);
    const realTotal = trades.reduce((s, t) => s + t.profitPct, 0);

    let equity = 100;
    let maxEquity = 100;
    let maxDrawdown = 0;
    trades.forEach(t => {
      equity *= (1 + t.strategyProfit / 100);
      maxEquity = Math.max(maxEquity, equity);
      maxDrawdown = Math.max(maxDrawdown, ((maxEquity - equity) / maxEquity) * 100);
    });

    return {
      trades, total: trades.length, winRate,
      avgWin, avgLoss, totalReturn, realTotal,
      finalEquity: equity, maxDrawdown,
      profitFactor: avgLoss < 0 ? Math.abs(avgWin / avgLoss) : 0,
    };
  }, [closed, strategy]);

  return (
    <div className="space-y-3">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-white font-semibold mb-3 flex items-center gap-2">
          <Ic.Activity size={16} className="text-purple-400"/>
          매매 일지로 전략 백테스팅
        </div>
        <div className="text-xs text-zinc-500 mb-3">
          과거 매매에 다른 전략을 적용했다면 어땠을까?
        </div>
        <div className="grid grid-cols-2 gap-2">
          {[
            ['target1', '1차 익절 (%)', 1],
            ['target2', '2차 익절 (%)', 1],
            ['stop1', '1차 손절 (%)', 1],
            ['absStop', '절대 손절 (%)', 1],
            ['maxDays', '최대 보유 (일)', 1],
            ['minScore', '최소 점수', 1],
          ].map(([key, label, step]) => (
            <div key={key}>
              <label className="text-xs text-zinc-500 mb-1 block">{label}</label>
              <input type="number" step={step} value={strategy[key]}
                onChange={e => setStrategy({...strategy, [key]: parseFloat(e.target.value) || 0})}
                className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono text-sm"/>
            </div>
          ))}
        </div>
      </div>

      {!result ? (
        <div className="bg-zinc-900 border border-zinc-800 border-dashed rounded-2xl p-8 text-center">
          <Ic.Book size={40} className="text-zinc-700 mx-auto mb-3"/>
          <div className="text-zinc-400 text-sm">매매 일지가 필요합니다</div>
          <div className="text-zinc-600 text-xs mt-1">최소 1건 이상 매도 기록 필요</div>
        </div>
      ) : (
        <>
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">백테스트 결과</div>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <div>
                <div className="text-xs text-zinc-500 mb-1">전략 적용 시</div>
                <div className={`text-2xl font-bold font-mono ${result.totalReturn >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                  {fmtPct(result.totalReturn)}
                </div>
              </div>
              <div>
                <div className="text-xs text-zinc-500 mb-1">실제 매매 수익률</div>
                <div className={`text-2xl font-bold font-mono ${result.realTotal >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                  {fmtPct(result.realTotal)}
                </div>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-2 text-xs">
              <div className="bg-zinc-950 rounded-lg p-2">
                <div className="text-zinc-500">승률</div>
                <div className={`font-bold ${result.winRate >= 60 ? 'text-emerald-400' : 'text-yellow-400'}`}>
                  {result.winRate.toFixed(0)}%
                </div>
              </div>
              <div className="bg-zinc-950 rounded-lg p-2">
                <div className="text-zinc-500">손익비</div>
                <div className="font-bold text-white">{result.profitFactor.toFixed(2)}</div>
              </div>
              <div className="bg-zinc-950 rounded-lg p-2">

// ─────────────────────────────────────
// 3. 세금 계산기 (한국 양도소득세)
// ─────────────────────────────────────
function TaxCalcPanel({ journal }) {
  const [year, setYear] = useState(new Date().getFullYear());
  const [isMajor, setIsMajor] = useState(false);

  const result = useMemo(() => {
    const closed = journal.filter(t => t.sellPrice && t.sellDate);
    const yearTrades = closed.filter(t => new Date(t.sellDate).getFullYear() === year);

    const totalProfit = yearTrades.reduce((s, t) => s + ((t.sellPrice - t.buyPrice) * t.qty), 0);
    const totalSellAmount = yearTrades.reduce((s, t) => s + (t.sellPrice * t.qty), 0);

    // 거래세 (코스피 0.15%, 코스닥 0.18% 평균 0.18%)
    const transactionTax = totalSellAmount * 0.0018;
    // 농어촌특별세 (코스피만 0.15%) - 코스닥은 거래세 0.18%로 통합
    // 단순화: 평균 0.18%로 계산

    // 양도소득세 (소액주주 vs 대주주)
    let capitalGainsTax = 0;
    if (isMajor && totalProfit > 0) {
      // 대주주: 22% (3억 초과 27.5%)
      if (totalProfit > 3_0000_0000) {
        capitalGainsTax = 3_0000_0000 * 0.22 + (totalProfit - 3_0000_0000) * 0.275;
      } else {
        capitalGainsTax = totalProfit * 0.22;
      }
    }
    // 소액주주는 양도소득세 면제 (거래세만)

    const netProfit = totalProfit - transactionTax - capitalGainsTax;

    return {
      yearTrades, totalProfit, totalSellAmount,
      transactionTax, capitalGainsTax, netProfit,
      effectiveTaxRate: totalProfit > 0 ? ((transactionTax + capitalGainsTax) / totalProfit) * 100 : 0,
    };
  }, [journal, year, isMajor]);

  return (
    <div className="space-y-3">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 space-y-3">
        <div className="text-white font-semibold flex items-center gap-2">
          <Ic.Award size={16} className="text-yellow-400"/>
          한국 주식 세금 계산기
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">기준 연도</label>
            <input type="number" value={year} onChange={e => setYear(parseInt(e.target.value) || 2026)}
              className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono"/>
          </div>
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">투자자 유형</label>
            <button onClick={() => setIsMajor(!isMajor)}
              className={`w-full px-3 py-2 rounded text-sm font-semibold transition ${
                isMajor ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'
              }`}>
              {isMajor ? '대주주' : '소액주주'}
            </button>
          </div>
        </div>
        <div className="text-xs text-zinc-500">
          ※ 대주주: 종목당 시총 10억+ 또는 지분 1% 이상 (코스피)
        </div>
      </div>

      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
        <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">{year}년 세금 시뮬레이션</div>
        {result.yearTrades.length === 0 ? (
          <div className="text-zinc-500 text-sm py-4 text-center">{year}년 매매 기록 없음</div>
        ) : (
          <>
            <div className="space-y-2">
              <div className="flex items-center justify-between p-2.5 bg-zinc-950 rounded-lg">
                <div className="text-sm text-zinc-300">총 매도 금액</div>
                <div className="text-white font-mono">₩{fmt(result.totalSellAmount)}</div>
              </div>
              <div className="flex items-center justify-between p-2.5 bg-zinc-950 rounded-lg">
                <div className="text-sm text-zinc-300">매도 차익 (양도소득)</div>
                <div className={`font-mono ${result.totalProfit >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                  {result.totalProfit >= 0 ? '+' : ''}₩{fmt(result.totalProfit)}
                </div>
              </div>
              <div className="flex items-center justify-between p-2.5 bg-orange-950/40 border border-orange-900/40 rounded-lg">
                <div className="text-sm text-orange-300">증권거래세 (0.18%)</div>
                <div className="text-orange-400 font-mono">-₩{fmt(result.transactionTax)}</div>
              </div>
              {isMajor && (
                <div className="flex items-center justify-between p-2.5 bg-red-950/40 border border-red-900/40 rounded-lg">
                  <div className="text-sm text-red-300">양도소득세 (22~27.5%)</div>
                  <div className="text-red-400 font-mono">-₩{fmt(result.capitalGainsTax)}</div>
                </div>
              )}
              <div className="flex items-center justify-between p-3 bg-emerald-950/40 border border-emerald-700 rounded-lg">
                <div className="text-emerald-300 font-semibold">실수령 (세후)</div>
                <div className={`text-xl font-bold font-mono ${result.netProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                  ₩{fmt(result.netProfit)}
                </div>
              </div>
            </div>
            <div className="mt-3 pt-3 border-t border-zinc-800 text-xs text-zinc-500">
              실효 세율: <span className="text-yellow-400 font-semibold">{result.effectiveTaxRate.toFixed(2)}%</span>
              · {result.yearTrades.length}건 거래
            </div>
          </>
        )}
      </div>

      <div className="bg-yellow-950/30 border border-yellow-900/40 rounded-xl p-4 text-xs">

          <div>• 손실 종목 매도 → 차익과 상계 (대주주만 해당)</div>
          <div>• 12월 말 손절매 → 다음 해 1월 재매수 (Wash Sale 한국 미적용)</div>
          <div>• 배당주는 ISA 계좌 활용 (배당소득 비과세 한도)</div>
          <div>• 코스피 거래세 0.15% &lt; 코스닥 0.18%</div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────
// 4. 포트폴리오 리밸런싱
// ─────────────────────────────────────
function RebalancingPanel({ holdings }) {
  const [targetShort, setTargetShort] = useState(35);
  const [targetLong, setTargetLong] = useState(65);

  useEffect(() => {
    if (targetShort + targetLong !== 100) {
      setTargetLong(100 - targetShort);
    }
  }, [targetShort]);

  const stats = useMemo(() => {
    if (holdings.length === 0) return null;
    const totalValue = holdings.reduce((s, h) => s + (h.currentPrice || h.buyPrice) * h.qty, 0);
    const shortValue = holdings.filter(h => h.portfolio === 'short').reduce((s, h) => s + (h.currentPrice || h.buyPrice) * h.qty, 0);
    const longValue = holdings.filter(h => h.portfolio === 'long').reduce((s, h) => s + (h.currentPrice || h.buyPrice) * h.qty, 0);
    const shortPct = totalValue > 0 ? (shortValue / totalValue) * 100 : 0;
    const longPct = totalValue > 0 ? (longValue / totalValue) * 100 : 0;
    const targetShortValue = totalValue * (targetShort / 100);
    const targetLongValue = totalValue * (targetLong / 100);
    return {
      totalValue, shortValue, longValue, shortPct, longPct,
      shortDelta: shortValue - targetShortValue,
      longDelta: longValue - targetLongValue,
    };
  }, [holdings, targetShort, targetLong]);

  return (
    <div className="space-y-3">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-white font-semibold mb-3 flex items-center gap-2">
          <Ic.PieChart size={16} className="text-cyan-400"/>
          포트폴리오 리밸런싱
        </div>
        <div className="text-xs text-zinc-500 mb-3">목표 비중 설정 (단기 + 장기 = 100%)</div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">⚡ 단기 (%)</label>
            <input type="range" min="0" max="100" value={targetShort}
              onChange={e => setTargetShort(parseInt(e.target.value))}
              className="w-full"/>
            <div className="text-center text-red-400 font-bold font-mono">{targetShort}%</div>
          </div>
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">🐢 장기 (%)</label>
            <input type="range" min="0" max="100" value={targetLong}
              onChange={e => setTargetLong(parseInt(e.target.value))}
              className="w-full"/>
            <div className="text-center text-emerald-400 font-bold font-mono">{targetLong}%</div>
          </div>
        </div>
      </div>

      {!stats ? (
        <div className="bg-zinc-900 border border-zinc-800 border-dashed rounded-2xl p-8 text-center">
          <Ic.Briefcase size={40} className="text-zinc-700 mx-auto mb-3"/>
          <div className="text-zinc-400 text-sm">보유 종목이 없습니다</div>
        </div>
      ) : (
        <>
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">현재 vs 목표</div>
            <div className="space-y-3">
              <div>
                <div className="flex items-center justify-between text-xs mb-1">
                  <span className="text-red-300">⚡ 단기</span>
                  <span className="text-zinc-400">현재 <span className="text-red-400 font-bold">{stats.shortPct.toFixed(1)}%</span> / 목표 {targetShort}%</span>
                </div>
                <div className="h-3 bg-zinc-800 rounded-full overflow-hidden">
                  <div className="h-full bg-red-500" style={{width: `${stats.shortPct}%`}}></div>
                </div>
                <div className="text-xs text-zinc-500 mt-1">
                  ₩{fmt(stats.shortValue)} / 목표 ₩{fmt(stats.totalValue * targetShort / 100)}
                </div>
              </div>
              <div>
                <div className="flex items-center justify-between text-xs mb-1">
                  <span className="text-emerald-300">🐢 장기</span>
                  <span className="text-zinc-400">현재 <span className="text-emerald-400 font-bold">{stats.longPct.toFixed(1)}%</span> / 목표 {targetLong}%</span>
                </div>
                <div className="h-3 bg-zinc-800 rounded-full overflow-hidden">
                  <div className="h-full bg-emerald-500" style={{width: `${stats.longPct}%`}}></div>
                </div>
                <div className="text-xs text-zinc-500 mt-1">
                  ₩{fmt(stats.longValue)} / 목표 ₩{fmt(stats.totalValue * targetLong / 100)}
                </div>
              </div>
            </div>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
            <div className="text-white font-semibold mb-3 text-sm">리밸런싱 권장</div>
            <div className="space-y-2">
              {Math.abs(stats.shortDelta) < stats.totalValue * 0.05 ? (
                <div className="text-xs text-emerald-400 p-2 bg-emerald-950/40 rounded">
                  ✅ 균형 양호 (5% 이내)
                </div>
              ) : stats.shortDelta > 0 ? (
                <div className="text-xs text-orange-400 p-2 bg-orange-950/40 rounded">
                  ⚠️ 단기 비중 초과: ₩{fmt(stats.shortDelta)} 매도 → 장기 매수 권장
                </div>
              ) : (
                <div className="text-xs text-blue-400 p-2 bg-blue-950/40 rounded">
                  💡 단기 비중 부족: ₩{fmt(Math.abs(stats.shortDelta))} 추가 매수 권장

            </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
            <div className="text-white font-semibold mb-3 text-sm">권장 비중 가이드</div>
            <div className="space-y-1 text-xs text-zinc-300">

              <div>• 적극 투자자: 단기 40~50% / 장기 50~60%</div>
              <div>• 안정 투자자: 단기 20~30% / 장기 70~80%</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────
// 5. 퀀트 스크리너
// ─────────────────────────────────────
function ScreenerPanel({ holdings, journal }) {
  const [criteria, setCriteria] = useState({
    minProfit: -10,
    maxProfit: 100,
    portfolio: 'all',
    sortBy: 'profit',
  });

  const filtered = useMemo(() => {
    let result = holdings.filter(h => {
      const cur = h.currentPrice || h.buyPrice;
      const profitPct = ((cur - h.buyPrice) / h.buyPrice) * 100;
      if (profitPct < criteria.minProfit) return false;
      if (profitPct > criteria.maxProfit) return false;
      if (criteria.portfolio !== 'all' && h.portfolio !== criteria.portfolio) return false;
      return true;
    });

    result.sort((a, b) => {
      if (criteria.sortBy === 'profit') {
        const pa = ((a.currentPrice || a.buyPrice) - a.buyPrice) / a.buyPrice;
        const pb = ((b.currentPrice || b.buyPrice) - b.buyPrice) / b.buyPrice;
        return pb - pa;
      }
      if (criteria.sortBy === 'value') {
        return (b.currentPrice || b.buyPrice) * b.qty - (a.currentPrice || a.buyPrice) * a.qty;
      }
      if (criteria.sortBy === 'date') {
        return new Date(b.buyDate) - new Date(a.buyDate);
      }
      return 0;
    });

    return result;
  }, [holdings, criteria]);

  return (
    <div className="space-y-3">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 space-y-3">
        <div className="text-white font-semibold flex items-center gap-2">
          <Ic.Filter size={16} className="text-cyan-400"/>
          퀀트 스크리너
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">최소 수익률 (%)</label>
            <input type="number" value={criteria.minProfit}
              onChange={e => setCriteria({...criteria, minProfit: parseFloat(e.target.value) || 0})}
              className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono text-sm"/>
          </div>
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">최대 수익률 (%)</label>
            <input type="number" value={criteria.maxProfit}
              onChange={e => setCriteria({...criteria, maxProfit: parseFloat(e.target.value) || 0})}
              className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono text-sm"/>
          </div>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">포트폴리오</label>
          <div className="grid grid-cols-3 gap-1">
            {['all', 'short', 'long'].map(p => (
              <button key={p} onClick={() => setCriteria({...criteria, portfolio: p})}
                className={`py-2 rounded text-xs font-semibold transition ${
                  criteria.portfolio === p ? 'bg-cyan-600 text-white' : 'bg-zinc-950 text-zinc-400'
                }`}>
                {p === 'all' ? '전체' : p === 'short' ? '⚡ 단기' : '🐢 장기'}
              </button>
            ))}
          </div>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">정렬</label>
          <div className="grid grid-cols-3 gap-1">
            {[['profit', '수익률'], ['value', '평가액'], ['date', '매수일']].map(([k, label]) => (
              <button key={k} onClick={() => setCriteria({...criteria, sortBy: k})}
                className={`py-2 rounded text-xs font-semibold transition ${
                  criteria.sortBy === k ? 'bg-cyan-600 text-white' : 'bg-zinc-950 text-zinc-400'
                }`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-xs text-zinc-500 mb-3">결과: <span className="text-white font-bold">{filtered.length}</span>개 종목</div>
        {filtered.length === 0 ? (
          <div className="text-zinc-500 text-sm py-4 text-center">조건에 맞는 종목 없음</div>
        ) : (
          <div className="space-y-2">
            {filtered.map(h => {
              const cur = h.currentPrice || h.buyPrice;
              const profitPct = ((cur - h.buyPrice) / h.buyPrice) * 100;
              return (
                <div key={h.id} className="flex items-center justify-between p-2.5 bg-zinc-950 rounded-lg">
                  <div className="min-w-0 flex-1">
                    <div className="flex items-center gap-2">
                      <div className="text-white font-semibold text-sm truncate">{h.name}</div>
                      <span className={`text-[9px] px-1 py-0.5 rounded ${h.portfolio === 'long' ? 'bg-emerald-900/40 text-emerald-300' : 'bg-red-900/40 text-red-300'}`}>
                        {h.portfolio === 'long' ? '장기' : '단기'}
                      </span>
                    </div>
                    <div className="text-xs text-zinc-500">{h.code} · ₩{fmt(cur)}</div>
                  </div>
                  <div className={`text-right ${profitPct >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                    <div className="font-bold text-sm">{fmtPct(profitPct)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────
// 6. DCA (분할매수) 계획
// ─────────────────────────────────────
function DcaPanel() {
  const [plan, setPlan] = useState({
    targetCode: '',
    targetName: '',
    monthlyAmount: 500000,
    months: 12,
    startDate: todayISO(),
  });

  const result = useMemo(() => {
    const totalAmount = plan.monthlyAmount * plan.months;
    const start = new Date(plan.startDate);
    const schedules = [];
    for (let i = 0; i < plan.months; i++) {
      const d = new Date(start);
      d.setMonth(d.getMonth() + i);
      schedules.push({
        no: i + 1,
        date: d.toISOString().split('T')[0],
        amount: plan.monthlyAmount,
      });
    }
    return { totalAmount, schedules };
  }, [plan]);

  return (
    <div className="space-y-3">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 space-y-3">
        <div className="text-white font-semibold flex items-center gap-2">
          <Ic.Calendar size={16} className="text-pink-400"/>
          DCA 분할매수 계획
        </div>
        <div className="text-xs text-zinc-500">
          매월 정해진 금액으로 자동 매수 → 평균단가 안정화
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">대상 종목</label>
          <StockSearch
            value={plan.targetCode}
            onChange={(v) => setPlan({...plan, targetCode: v})}

        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-zinc-500 mb-1 block">월 금액 (₩)</label>
            <input type="number" inputMode="numeric" value={plan.monthlyAmount}
              onChange={e => setPlan({...plan, monthlyAmount: parseInt(e.target.value) || 0})}
              className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono text-sm"/>

          <div>
            <label className="text-xs text-zinc-500 mb-1 block">기간 (개월)</label>
            <input type="number" value={plan.months}
              onChange={e => setPlan({...plan, months: parseInt(e.target.value) || 1})}
              className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white font-mono text-sm"/>
          </div>
        </div>
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">시작일</label>
          <input type="date" value={plan.startDate}
            onChange={e => setPlan({...plan, startDate: e.target.value})}
            className="w-full bg-zinc-950 border border-zinc-800 rounded px-2 py-2 text-white text-sm"/>
        </div>
      </div>

      <div className="bg-pink-950/30 border border-pink-900/40 rounded-2xl p-4">
        <div className="text-pink-300 text-xs uppercase tracking-wider mb-2">총 투자 계획</div>
        <div className="text-2xl font-bold text-white font-mono">₩{fmt(result.totalAmount)}</div>
        <div className="text-xs text-zinc-400 mt-1">
          {plan.months}개월 × ₩{fmt(plan.monthlyAmount)}
        </div>
      </div>

      {plan.targetName && (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
          <div className="text-white font-semibold mb-3 text-sm">📅 매수 일정</div>
          <div className="space-y-1 max-h-64 overflow-y-auto">
            {result.schedules.map((s, i) => (
              <div key={i} className="flex items-center justify-between p-2 bg-zinc-950 rounded text-xs">
                <div className="flex items-center gap-2">
                  <div className="text-zinc-500 font-mono w-8">#{s.no}</div>
                  <div className="text-white">{s.date}</div>
                </div>
                <div className="text-emerald-400 font-mono">₩{fmt(s.amount)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-white font-semibold mb-2 text-sm">💡 DCA 효과</div>
        <div className="text-xs text-zinc-300 space-y-1">
          <div>• 평균단가 안정화 (저점/고점 분산 매수)</div>
          <div>• 시장 타이밍 부담 감소</div>
          <div>• 장기 적립식 투자에 적합</div>
          <div>• 매달 자동이체로 강제 저축 효과</div>
        </div>
      </div>
    </div>
  );
}
// ─────────────────────────────────────
// 종목 스캐너 (자동 추천)
// ─────────────────────────────────────
function StockScannerPanel({ backendUrl, apiKey, watchlist = [], setWatchlist }) {
  const [results, setResults] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [scanHistory, setScanHistoryState] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.SCAN_HISTORY) || '[]'); }
    catch { return []; }
  });
  const [showHistory, setShowHistory] = useState(false);
  const saveScanHistory = (picks) => {
    setScanHistoryState(prev => {
      const entry = { at: Date.now(), count: picks.length, picks: picks.slice(0, 8).map(p => ({ code: p.code, name: p.name, lScore: p.lScore, pScore: p.pScore, signal: p.combinedSignal?.signal || 'HOLD', market: p.market })) };
      const next = [entry, ...prev].slice(0, 10);
      localStorage.setItem(STORAGE_KEYS.SCAN_HISTORY, JSON.stringify(next));
      return next;
    });
  };
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [mode, setMode] = useState('livermore'); // livermore | lynch | all

  async function runScan() {
    if (!backendUrl) { alert('설정 → 실시간 탭에서 백엔드 URL을 먼저 입력해주세요.'); return; }
    setScanning(true); setResults([]);

    // /api/movers로 오늘의 전종목 활성 후보 동적 조회
    let stocks;
    try {
      const mr = await fetch(`${backendUrl}/api/movers`);
      const md = await mr.json();
      if (md.candidates?.length) {
        stocks = md.candidates.map(s => ({
          ...s,
          sector: corpCodeMap[s.code]?.sector || '기타',
          corp:   corpCodeMap[s.code]?.corp   || '',
        }));
      }
    } catch {}
    if (!stocks) stocks = Object.entries(corpCodeMap).map(([code, info]) => ({ code, ...info }));

    setProgress({ done: 0, total: stocks.length });
    const BATCH = 5; const all = [];
    for (let i = 0; i < stocks.length; i += BATCH) {
      const batch = stocks.slice(i, i + BATCH);
      const fetched = await Promise.all(batch.map(async s => {
        try {
          const dartParam = apiKey ? `&dartKey=${encodeURIComponent(apiKey)}` : '';
          const corpParam = s.corp ? `&corp=${s.corp}` : '';
          const sectorParam = s.sector ? `&sector=${encodeURIComponent(s.sector)}` : '';
          const r = await fetch(`${backendUrl}/api/analysis?code=${s.code}${corpParam}${sectorParam}${dartParam}`);
          if (!r.ok) return null;
          const d = await r.json();
          if (d.error) return null;
          return { ...s, ...d, name: s.name || d.name, market: s.market || d.market };
        } catch { return null; }
      }));
      const valid = fetched.filter(Boolean);
      all.push(...valid);
      setProgress(p => ({ ...p, done: Math.min(i + BATCH, stocks.length) }));
      setResults([...all]);
    }
    setScanning(false);
  }

  // Save scan history when results change
  React.useEffect(() => {
    if (results.length > 0) saveScanHistory(results);
  }, [results]);

  const sorted = [...results].sort((a, b) => {
    const sa = mode === 'livermore' ? (a.lScore ?? 0) : mode === 'lynch' ? (a.pScore ?? 0) : (a.score ?? 0);
    const sb = mode === 'livermore' ? (b.lScore ?? 0) : mode === 'lynch' ? (b.pScore ?? 0) : (b.score ?? 0);
    return sb - sa;
  });

  // 섹터 내 순위 계산
  const sectorRankMap = useMemo(() => {
    const bySector = {};
    results.forEach(r => {
      if (!r.sector) return;
      if (!bySector[r.sector]) bySector[r.sector] = [];
      bySector[r.sector].push(r);
    });
    const rankMap = {};
    Object.entries(bySector).forEach(([sector, stocks]) => {
      const sScore = s => mode === 'livermore' ? (s.lScore ?? 0) : mode === 'lynch' ? (s.pScore ?? 0) : (s.score ?? 0);
      const sorted = [...stocks].sort((a, b) => sScore(b) - sScore(a));
      sorted.forEach((s, i) => { rankMap[s.code] = { rank: i + 1, total: sorted.length }; });
    });
    return rankMap;
  }, [results, mode]);

  const visible = sorted.filter(r => {
    if (mode === 'livermore') return (r.lGrade === '🏆 추천' || r.lGrade === '🟢 후보');
    if (mode === 'lynch')     return (r.pGrade === '🏆 추천' || r.pGrade === '🟢 후보');
    return true;
  });

  const MarketBadge = ({ market }) => (
    <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${market === 'KOSPI' ? 'bg-blue-900/60 text-blue-300' : 'bg-emerald-900/60 text-emerald-300'}`}>
      {market}
    </span>
  );

  const GradeBadge = ({ grade }) => {
    const c = grade === '🏆 추천' ? 'text-yellow-300' : grade === '🟢 후보' ? 'text-emerald-400' : grade === '🟡 관찰' ? 'text-yellow-500' : 'text-zinc-500';
    return <span className={`text-xs font-bold ${c}`}>{grade}</span>;
  };

  const LYNCH_CATEGORY_MAP = {
    fast_grower: { label: '🚀 고성장주', color: 'bg-emerald-900/60 text-emerald-300' },
    stalwart:    { label: '🏛️ 우량주',  color: 'bg-blue-900/60 text-blue-300' },
    slow_grower: { label: '🐢 저성장주', color: 'bg-zinc-800 text-zinc-400' },
    cyclical:    { label: '🔄 경기민감', color: 'bg-orange-900/60 text-orange-300' },
    turnaround:  { label: '♻️ 회생주',  color: 'bg-purple-900/60 text-purple-300' },
    asset_play:  { label: '💎 자산주',  color: 'bg-yellow-900/60 text-yellow-300' },
  };
  const LynchCatBadge = ({ category }) => {
    const m = LYNCH_CATEGORY_MAP[category];
    if (!m) return null;
    return <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${m.color}`}>{m.label}</span>;
  };

  const ReasonTags = ({ reasons }) => {
    if (!reasons?.length) return null;
    return (
      <div className="flex flex-wrap gap-1 mt-1.5">
        {reasons.slice(0, 3).map((t, i) => {
          const neg = t.includes('역배열') || t.includes('이탈') || t.includes('과열') || t.includes('하락') || t.includes('제외') || t.includes('부족');
          return <span key={i} className={`text-[10px] px-1.5 py-0.5 rounded ${neg ? 'bg-zinc-800 text-zinc-400' : 'bg-zinc-700 text-zinc-200'}`}>{t}</span>;
        })}
      </div>
    );
  };

  const ScanHistorySection = () => (
    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 space-y-2">
      <button onClick={() => setShowHistory(h => !h)} className="flex items-center justify-between w-full">
        <span className="text-sm font-bold text-zinc-300">🕐 스캔 기록 ({scanHistory.length}회)</span>
        <span className="text-zinc-500 text-sm">{showHistory ? '▲' : '▼'}</span>
      </button>
      {showHistory && (
        <div className="space-y-2 mt-1">
          {scanHistory.length === 0 ? (
            <div className="text-xs text-zinc-500 text-center py-2">스캔 기록 없음</div>
          ) : scanHistory.map((entry, idx) => (
            <div key={idx} className="bg-zinc-950 rounded-xl p-3 space-y-1.5">
              <div className="flex items-center justify-between text-xs">
                <span className="text-zinc-400">{new Date(entry.at).toLocaleString('ko-KR')}</span>
                <span className="text-zinc-500">{entry.count}개 결과</span>
              </div>
              <div className="flex flex-wrap gap-1.5">
                {entry.picks.map(p => (
                  <div key={p.code} className={`text-[10px] px-2 py-1 rounded-lg border ${p.signal === 'BUY' ? 'bg-red-900/30 border-red-800/50 text-red-300' : p.signal === 'SELL' ? 'bg-blue-900/30 border-blue-800/50 text-blue-300' : 'bg-zinc-800 border-zinc-700 text-zinc-400'}`}>
                    <span className="font-bold">{p.name || p.code}</span>
                    <span className="ml-1 opacity-70">L{p.lScore}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div className="space-y-3">
      {/* 헤더 — 철학 탭 */}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 space-y-3">
        <div className="grid grid-cols-3 gap-1.5 bg-zinc-950 rounded-xl p-1">
          {[
            { key: 'livermore', icon: '⚡', label: '리버모어', sub: '추세·모멘텀' },
            { key: 'lynch',     icon: '🌱', label: '피터 린치', sub: '성장·가치' },
            { key: 'all',       icon: '📋', label: '전체',     sub: '통합점수' },
          ].map(({ key, icon, label, sub }) => (
            <button key={key} onClick={() => setMode(key)}
              className={`rounded-lg py-2 text-center transition ${mode === key
                ? key === 'livermore' ? 'bg-blue-700 text-white' : key === 'lynch' ? 'bg-emerald-700 text-white' : 'bg-zinc-600 text-white'
                : 'text-zinc-400 hover:text-white'}`}>
              <div className="text-base">{icon}</div>
              <div className="text-xs font-bold">{label}</div>
              <div className="text-[10px] opacity-70">{sub}</div>
            </button>
          ))}
        </div>

        <button onClick={runScan} disabled={scanning}
          className={`w-full py-3 rounded-xl font-bold text-sm transition ${scanning ? 'bg-zinc-700 text-zinc-400 cursor-not-allowed' : 'bg-red-700 hover:bg-red-600 text-white'}`}>
          {scanning ? `스캔 중... ${progress.done} / ${progress.total}` : `🔭 전체 시장 스캔 (KOSPI+KOSDAQ)`}
        </button>
        {scanning && (
          <div className="w-full bg-zinc-800 rounded-full h-1.5">
            <div className="bg-red-600 h-1.5 rounded-full transition-all" style={{ width: `${progress.total ? (progress.done / progress.total) * 100 : 0}%` }}/>
          </div>
        )}
      </div>

      {/* 결과 */}
      {visible.length > 0 && (
        <div className="space-y-2">
          <div className="text-xs text-zinc-500 px-1">
            {visible.length}개 {mode === 'livermore' ? '리버모어 추천·후보' : mode === 'lynch' ? '린치 추천·후보' : '전종목'} · 점수 높은 순
          </div>
          {visible.map(r => {
            const score = mode === 'livermore' ? (r.lScore ?? 0) : mode === 'lynch' ? (r.pScore ?? 0) : (r.score ?? 0);
            const grade = mode === 'livermore' ? r.lGrade : mode === 'lynch' ? r.pGrade : r.grade;
            const reasons = mode === 'livermore' ? (r.lReasons || []) : mode === 'lynch' ? (r.pReasons || []) : (r.reasons || []);
            const oppScore = mode === 'livermore' ? (r.pScore ?? 0) : (r.lScore ?? 0);
            const oppLabel = mode === 'livermore' ? '린치' : '리버모어';
            const scoreColor = score >= 70 ? 'text-red-400' : score >= 50 ? 'text-yellow-400' : 'text-zinc-400';
            const csig = r.combinedSignal;
            const srank = sectorRankMap[r.code];
            return (
              <div key={r.code} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-2">
                {/* 1행: 종목명 + 점수 */}
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-white font-bold text-sm">{corpCodeMap[r.code]?.name || r.name}</span>
                      <MarketBadge market={r.market}/>
                      {csig?.signal === 'BUY' && <span className="text-[9px] px-1.5 py-0.5 rounded font-bold bg-red-900/60 text-red-300">매수</span>}
                      {csig?.signal === 'SELL' && <span className="text-[9px] px-1.5 py-0.5 rounded font-bold bg-blue-900/60 text-blue-300">매도</span>}
                    </div>
                    <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                      <span className="text-zinc-500 text-xs">{r.code}</span>
                      {r.sector && <span className="text-zinc-600 text-xs">· {r.sector}</span>}
                      {srank && (
                        <span className={`text-[9px] px-1 rounded font-bold ${srank.rank === 1 ? 'bg-yellow-900/50 text-yellow-300' : 'bg-zinc-800 text-zinc-500'}`}>
                          섹터 {srank.rank}/{srank.total}위
                        </span>
                      )}
                      {r.fundamentals?.lynchCategory && <LynchCatBadge category={r.fundamentals.lynchCategory}/>}
                    </div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className={`text-xl font-black font-mono ${scoreColor}`}>{score}</div>
                    <div className="text-[9px] text-zinc-500">{oppLabel} {oppScore}점</div>
                  </div>
                </div>
                {/* 점수 바 */}
                <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full ${score >= 70 ? 'bg-red-500' : score >= 50 ? 'bg-yellow-500' : 'bg-zinc-600'}`}
                    style={{width: `${Math.min(100, score)}%`}}/>
                </div>
                {/* 2행: 현재가 + 지표 */}
                <div className="flex items-center gap-2 text-xs flex-wrap">
                  <span className="text-white font-mono font-semibold">{r.close?.toLocaleString('ko-KR')}원</span>
                  <span className={`font-bold ${r.changeRate >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
                    {r.changeRate >= 0 ? '▲' : '▼'}{Math.abs(r.changeRate ?? 0).toFixed(2)}%
                  </span>
                  <span className={`text-zinc-400 ${r.rsi < 30 ? 'text-blue-400' : r.rsi > 70 ? 'text-red-400' : ''}`}>RSI {r.rsi?.toFixed(0)}</span>
                  {r.volRatio > 2 && <span className="text-purple-400">거래량 {r.volRatio.toFixed(1)}x</span>}
                  {r.macd?.lastCross === 'golden' && <span className="text-emerald-400">MACD↑</span>}
                  {r.bb && <span className="text-indigo-400">BB{r.bb.percentB?.toFixed(0)}%</span>}
                  {r.mdd != null && r.mdd < -20 && <span className="text-orange-400">MDD{r.mdd.toFixed(0)}%</span>}
                </div>
                {/* 이유 태그 */}
                <ReasonTags reasons={reasons}/>
              </div>
            );
          })}
        </div>
      )}

      {!scanning && results.length > 0 && visible.length === 0 && (
        <div className="text-center text-zinc-500 py-6 text-sm">
          {mode === 'livermore' ? '리버모어' : '린치'} 기준 추천 종목 없음<br/>
          <span className="text-xs text-zinc-600">📋 전체 탭에서 전체 순위를 확인하세요</span>
        </div>
      )}
      {!scanning && results.length === 0 && (
        <div className="text-center text-zinc-600 py-8 text-sm">
          스캔 버튼을 눌러 추천 종목을 찾아보세요
        </div>
      )}

      <ScanHistorySection/>
    </div>
  );
}

function WatchlistPanel({ watchlist, setWatchlist, backendUrl, apiKey }) {
  const LYNCH_CAT = {
    fast_grower:  { label: '급성장',     color: 'bg-emerald-900/60 text-emerald-300' },
    stalwart:     { label: '우량성장',   color: 'bg-blue-900/60 text-blue-300' },
    slow_grower:  { label: '저성장',     color: 'bg-zinc-700/60 text-zinc-300' },
    cyclical:     { label: '경기순환',   color: 'bg-amber-900/60 text-amber-300' },
    turnaround:   { label: '턴어라운드', color: 'bg-purple-900/60 text-purple-300' },
    asset_play:   { label: '자산주',     color: 'bg-rose-900/60 text-rose-300' },
  };

  const [cache, setCache] = React.useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
      const now = Date.now();
      const valid = {};
      for (const [k, v] of Object.entries(raw)) {
        if (v.cachedAt && now - v.cachedAt < 3600000) valid[k] = v.data;
      }
      return valid;
    } catch { return {}; }
  });
  const [loading, setLoading] = React.useState({});

  const saveToCache = (code, data) => {
    setCache(prev => ({ ...prev, [code]: data }));
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEYS.ANALYSIS_CACHE) || '{}');
      raw[code] = { data, cachedAt: Date.now() };
      localStorage.setItem(STORAGE_KEYS.ANALYSIS_CACHE, JSON.stringify(raw));
    } catch {}
  };

  const doFetch = async (w) => {
    if (!backendUrl || !apiKey) return;
    const sectorParam = w.sector ? `&sector=${encodeURIComponent(w.sector)}` : '';
    const corpParam = w.corpCode ? `&corp=${w.corpCode}&dartKey=${apiKey}` : '';
    const url = `${backendUrl}/api/analysis?code=${w.code}&name=${encodeURIComponent(w.name || w.code)}${sectorParam}${corpParam}&key=${apiKey}`;
    try {
      const r = await fetch(url);
      if (!r.ok) return;
      const data = await r.json();
      saveToCache(w.code, {
        close: data.close,
        lScore: data.livermoreScore,
        pScore: data.lynchScore,
        combinedSignal: data.combinedSignal,
        fundamentals: data.fundamentals,
        _cachedAt: Date.now(),
      });
    } catch {}
  };

  const refreshOne = async (w) => {
    setLoading(prev => ({ ...prev, [w.code]: true }));
    try { await doFetch(w); } finally {
      setLoading(prev => ({ ...prev, [w.code]: false }));
    }
  };

  const refreshAll = async () => {
    const codes = watchlist.map(w => w.code);
    setLoading(codes.reduce((a, c) => ({ ...a, [c]: true }), {}));
    await Promise.all(watchlist.map(w => doFetch(w)));
    setLoading({});
  };

  const removeFromWatchlist = (code) => {
    setWatchlist(prev => prev.filter(w => w.code !== code));
  };

  return (
    <div className="space-y-3 safe-bottom">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-2xl font-bold text-white">관심 종목</div>
          <div className="text-xs text-zinc-500 mt-0.5">차트 분석에서 ⭐ 눌러 추가</div>
        </div>
        {backendUrl && watchlist.length > 0 && (
          <button onClick={refreshAll}
            className="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-xl">
            🔄 전체 새로고침
          </button>
        )}
      </div>

      {watchlist.length === 0 ? (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 text-center space-y-2">
          <div className="text-4xl">⭐</div>

function DartUrls({ corpCode, apiKey: customKey }) {
  const [copied, setCopied] = useState(null);
  const today = new Date();
  const monthAgo = new Date(today);
  monthAgo.setMonth(monthAgo.getMonth() - 1);
  const fmtDate = d => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
  const KEY = customKey || localStorage.getItem(STORAGE_KEYS.API_KEY) || '여기에키';

  const urls = [
    { label: '1. 공시 검색 (1개월)', desc: '자기주식취득·풍문해명·실적', color: 'blue',
      url: `https://opendart.fss.or.kr/api/list.json?crtfc_key=${KEY}&corp_code=${corpCode}&bgn_de=${fmtDate(monthAgo)}&end_de=${fmtDate(today)}&page_count=20`,
    },
    { label: '2. 임원 자사주 거래', desc: '🟢 사장·임원 매수 = 강력 시그널', color: 'emerald',
      url: `https://opendart.fss.or.kr/api/elestock.json?crtfc_key=${KEY}&corp_code=${corpCode}`,
    },
    { label: '3. 재무제표 (3년)', desc: '매출·영업이익·순이익', color: 'purple',
      url: `https://opendart.fss.or.kr/api/fnlttSinglAcnt.json?crtfc_key=${KEY}&corp_code=${corpCode}&bsns_year=2024&reprt_code=11011`,
    },
    { label: '4. 5%↑ 대량보유 변동', desc: '국민연금·외국인·기관', color: 'orange',
      url: `https://opendart.fss.or.kr/api/majorstock.json?crtfc_key=${KEY}&corp_code=${corpCode}`,
    },
  ];

  const copyUrl = (url, idx) => {
    navigator.clipboard.writeText(url);
    setCopied(idx);
    setTimeout(() => setCopied(null), 2000);
  };
  const copyAll = () => {
    navigator.clipboard.writeText(urls.map(u => u.url).join('\n'));
    setCopied('all');
    setTimeout(() => setCopied(null), 2000);
  };

  return (
    <div className="space-y-3">
      <button onClick={copyAll}
        className="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3 font-semibold transition flex items-center justify-center gap-2">
        {copied === 'all' ? <Ic.Check size={20}/> : <Ic.Copy size={20}/>}
        {copied === 'all' ? '복사 완료!' : '4개 URL 모두 복사'}
      </button>
      <div className="space-y-2">
        {urls.map((u, i) => {
          const cMap = {
            blue: 'border-blue-900/40 bg-blue-950/20',
            emerald: 'border-emerald-900/40 bg-emerald-950/20',
            purple: 'border-purple-900/40 bg-purple-950/20',
            orange: 'border-orange-900/40 bg-orange-950/20',
          };
          return (
            <div key={i} className={`border ${cMap[u.color]} rounded-xl p-3`}>
              <div className="flex items-start justify-between mb-2">
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-semibold text-white">{u.label}</div>
                  <div className="text-xs text-zinc-500 mt-0.5">{u.desc}</div>
                </div>
                <button onClick={() => copyUrl(u.url, i)} className="text-zinc-400 p-1.5 rounded shrink-0">
                  {copied === i ? <Ic.Check size={16} className="text-green-400"/> : <Ic.Copy size={16}/>}
                </button>
              </div>
              <div className="text-[10px] text-zinc-600 font-mono break-all">{u.url}</div>
            </div>
          );
        })}
      </div>
      <div className="text-xs text-zinc-500 mt-2 p-3 bg-zinc-950 rounded-lg">
        💡 <strong className="text-zinc-300">사용법</strong>: 복사 후 Claude에게 붙여넣기 → 자동 분석
      </div>
    </div>
  );
}

    const codeToUse = selected?.code || code;
    const knownCorp = corpCodeMap[codeToUse]?.corp || selected?.corp || '';
    if (knownCorp) { setFetchedCorp(''); setFetchingCorp(false); return; }
    if (codeToUse.length === 6 && apiKey && backendUrl) {
      setFetchingCorp(true);
      setFetchedCorp('');
      fetch(`${backendUrl}/api/analysis?code=${codeToUse}&dartKey=${encodeURIComponent(apiKey)}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.corpCode) setFetchedCorp(d.corpCode); })
        .catch(() => {})
        .finally(() => setFetchingCorp(false));
    } else {
      setFetchedCorp('');
      setFetchingCorp(false);
    }
  }, [code, selected, apiKey, backendUrl]);

  const effectiveCorp = selected?.corp || corpCodeMap[code]?.corp || fetchedCorp;

  return (
    <div className="space-y-4">
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 space-y-3">
        <div>
          <label className="text-xs text-zinc-500 mb-1 block">종목 검색</label>
          <StockSearch
            value={code}
            onChange={(v) => { setCode(v); setSelected(null); }}
            onSelect={(s) => { setCode(s.code); setSelected(s); }}
          />
        </div>
        {selected ? (
          <div className="bg-blue-950/40 border border-blue-900/40 rounded-lg p-3">
            <div className="text-emerald-400 text-sm font-semibold">✓ {selected.name} ({selected.market})</div>
            <div className="text-xs text-zinc-500 mt-1">corp_code: <span className="font-mono text-zinc-300">{selected.corp}</span></div>
          </div>
        ) : code.length === 6 && !corpCodeMap[code] ? (
          fetchingCorp ? (
            <div className="bg-zinc-900 border border-zinc-700 rounded-lg p-3">
              <div className="text-zinc-400 text-sm animate-pulse">corp_code 자동 조회 중...</div>
            </div>
          ) : fetchedCorp ? (
            <div className="bg-blue-950/40 border border-blue-900/40 rounded-lg p-3">
              <div className="text-emerald-400 text-sm font-semibold">✓ corp_code 자동 조회 완료</div>
              <div className="text-xs text-zinc-500 mt-1">corp_code: <span className="font-mono text-zinc-300">{fetchedCorp}</span></div>
            </div>
          ) : (
            <div className="bg-yellow-950/40 border border-yellow-900/40 rounded-lg p-3">
              <div className="text-yellow-400 text-sm">⚠️ 미등록 종목</div>
              <div className="text-xs text-zinc-500 mt-1">OpenDart API 키 등록 시 corp_code 자동 조회됩니다</div>
            </div>
          )
        ) : null}
      </div>
      {effectiveCorp && <DartUrls corpCode={effectiveCorp} apiKey={apiKey}/>}
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
        <div className="text-white font-semibold mb-3">자주 쓰는 종목</div>
        <div className="grid grid-cols-2 gap-2">
          {corpCodeList.slice(0, 12).map(s => (
            <button key={s.code} onClick={() => { setCode(s.code); setSelected(s); }}
              className="text-left p-2.5 bg-zinc-950 border border-zinc-800 rounded-lg transition">
              <div className="text-sm text-white truncate">{s.name}</div>
              <div className="text-[10px] text-zinc-500 font-mono">{s.code} · {s.sector}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// SETTINGS TAB (API 키 + 백업 + 가이드)
// ═══════════════════════════════════════════════
function SettingsTab({ apiKey, setApiKey, holdings, setHoldings, journal, setJournal, checklist, setChecklist, backendUrl, setBackendUrl, autoRefresh, setAutoRefresh }) {
  const [subTab, setSubTab] = useState('api');
  const [tempKey, setTempKey] = useState(apiKey || '');
  const [showKey, setShowKey] = useState(false);
  const [tempUrl, setTempUrl] = useState(backendUrl || '');
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const testBackend = async () => {
    if (!tempUrl) { alert('URL 입력 필요'); return; }
    setTesting(true);
    setTestResult(null);
    try {
      const url = tempUrl.replace(/\/$/, '');
      const r = await fetch(`${url}/api/quotes?codes=005380`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (data.quotes && data.quotes[0] && data.quotes[0].price) {
        setTestResult({ ok: true, msg: `✅ 정상 작동! 현대차 ₩${Math.round(data.quotes[0].price).toLocaleString('ko-KR')}` });
      } else {
        setTestResult({ ok: false, msg: '응답 형식 오류' });
      }
    } catch (e) {
      setTestResult({ ok: false, msg: `❌ ${e.message}` });
    }
    setTesting(false);
  };

  const exportData = () => {
    const data = { holdings, journal, checklist, exportDate: todayISO(), version: '2.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kt-trading-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (confirm(`데이터 가져오기:\n보유 ${data.holdings?.length || 0}개\n일지 ${data.journal?.length || 0}건\n\n현재 데이터를 덮어씌웁니다. 계속하시겠습니까?`)) {
          if (data.holdings) setHoldings(data.holdings);
          if (data.journal) setJournal(data.journal);
          if (data.checklist) setChecklist(data.checklist);
          alert('가져오기 완료!');
        }
      } catch (err) {
        alert('파일 형식이 올바르지 않습니다.');
      }
    };
    reader.readAsText(file);
  };

  return (
    <div className="space-y-4 safe-bottom">
      <div>
        <div className="text-2xl font-bold text-white">설정 · 가이드</div>
        <div className="text-xs text-zinc-500 mt-0.5">API · 백업 · 투자 이론</div>
      </div>
      <div className="grid grid-cols-4 gap-2 bg-zinc-900 rounded-xl p-1">
        {[
          { id: 'api', label: '🔑 API' },
          { id: 'live', label: '⚡ 실시간' },
          { id: 'backup', label: '💾 백업' },
          { id: 'guide', label: '📚 가이드' },
        ].map(s => (
          <button key={s.id} onClick={() => setSubTab(s.id)}
            className={`py-2 rounded-lg text-xs font-semibold transition ${
              subTab === s.id ? 'bg-zinc-800 text-white' : 'text-zinc-400'
            }`}>{s.label}</button>
        ))}
      </div>

      {subTab === 'live' && (
        <div className="space-y-4">
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-white font-semibold mb-3">⚡ 실시간 시세 백엔드</div>
            <div className="text-xs text-zinc-500 mb-3">
              Cloudflare Workers에 배포한 백엔드 URL을 입력하면 보유 종목 시세가 1분마다 자동 갱신됩니다.
            </div>
            <div className="space-y-2">
              <input type="text" value={tempUrl} onChange={e => setTempUrl(e.target.value)}
                placeholder="https://your-app.vercel.app"
                className="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-white font-mono text-sm focus:border-cyan-700 outline-none"/>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={testBackend} disabled={testing}
                  className="bg-zinc-800 hover:bg-zinc-700 text-white rounded-lg py-2.5 font-semibold transition text-sm disabled:opacity-50">
                  {testing ? '테스트 중...' : '연결 테스트'}
                </button>
                <button onClick={() => {
                  setBackendUrl(tempUrl);
                  alert('저장 완료!');
                }} className="bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg py-2.5 font-semibold transition text-sm">
                  저장
                </button>
              </div>
              {testResult && (
                <div className={`p-3 rounded-lg text-sm ${testResult.ok ? 'bg-emerald-950/40 border border-emerald-800/40 text-emerald-300' : 'bg-red-950/40 border border-red-800/40 text-red-300'}`}>
                  {testResult.msg}
                </div>
              )}
              {backendUrl && (
                <button onClick={() => {
                  if (confirm('백엔드 URL을 삭제하시겠습니까?')) {
                    setBackendUrl('');
                    setTempUrl('');
                  }
                }} className="w-full text-red-400 text-sm py-2">URL 삭제</button>
              )}
            </div>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="flex items-center justify-between">
              <div>
                <div className="text-white font-semibold">자동 갱신</div>
                <div className="text-xs text-zinc-500 mt-0.5">1분마다 시세 자동 업데이트</div>
              </div>
              <button onClick={() => setAutoRefresh(!autoRefresh)}
                className={`w-12 h-7 rounded-full relative transition ${autoRefresh ? 'bg-emerald-600' : 'bg-zinc-700'}`}>
                <div className={`absolute top-0.5 w-6 h-6 bg-white rounded-full transition ${autoRefresh ? 'left-5' : 'left-0.5'}`}></div>
              </button>
            </div>
          </div>

          <div className="bg-cyan-950/30 border border-cyan-900/40 rounded-xl p-4 text-xs">
            <div className="text-cyan-400 font-bold mb-2">💡 백엔드 배포 가이드</div>
            <div className="text-zinc-300 space-y-1.5">
              <div>1. Vercel.com 가입 (Google/GitHub 로그인)</div>
              <div>2. 받은 백엔드 ZIP 압축 해제</div>
              <div>3. Vercel CLI로 배포 또는 GitHub 연동</div>
              <div>4. 배포된 URL을 위에 입력</div>
              <div>5. "연결 테스트" 클릭 → ✅ 표시 확인</div>
              <div>6. "저장" → 자동 갱신 시작</div>
            </div>
            <div className="mt-3 pt-3 border-t border-cyan-900/40 text-zinc-400">
              💵 비용: <span className="text-emerald-400 font-bold">완전 무료</span> (Vercel Free Tier)
              <br/>📊 시세: Yahoo Finance (15분 지연)
              <br/>🔒 본인만 사용 (프라이빗 URL)
            </div>
          </div>
        </div>
      )}

      {subTab === 'api' && (
        <div className="space-y-4">
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
            <div className="text-white font-semibold mb-3">OpenDart API 키</div>
            <div className="text-xs text-zinc-500 mb-3">
